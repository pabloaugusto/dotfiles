name: PR Title Convention

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate title
        shell: pwsh
        run: |
          ./scripts/validate-conventional-title.ps1 -Title '${{ github.event.pull_request.title }}'
