name: Bootstrap Integration

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  linux-relink:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Task
        uses: go-task/setup-task@v2

      - name: Run canonical Linux bootstrap integration gate
        run: task ci:bootstrap:integration:linux

  windows-relink:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Task
        uses: go-task/setup-task@v2

      - name: Run canonical Windows bootstrap integration gate
        shell: pwsh
        run: task ci:bootstrap:integration:windows
