name: AI Governance

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'LICOES-APRENDIDAS.md'
      - '.agents/**'
      - '.codex/README.md'
      - 'docs/AI-AGENTS-CATALOG.md'
      - 'docs/AI-DELEGATION-FLOW.md'
      - 'docs/AI-GOVERNANCE-AND-REGRESSION.md'
      - 'docs/AI-SKILLS-CATALOG.md'
      - 'docs/AI-SOURCE-AUDIT.md'
      - 'docs/AI-WIP-TRACKER.md'
      - 'docs/ROADMAP.md'
      - 'docs/ROADMAP-DECISIONS.md'
      - 'docs/ai-operating-model.md'
      - 'tests/python/ai_assets_validator_test.py'
      - 'tests/python/ai_lessons_test.py'
      - 'tests/python/ai_roadmap_test.py'
      - 'tests/python/ai_worklog_test.py'
      - 'scripts/ai-lessons.py'
      - 'scripts/ai_lessons_lib.py'
      - 'scripts/ai-worklog.py'
      - 'scripts/ai-roadmap.py'
      - 'scripts/ai_roadmap_lib.py'
      - 'scripts/validate-ai-assets.py'
      - 'scripts/validate-ai-assets.ps1'
      - 'Taskfile.yml'
      - '.gitignore'
  push:
    paths:
      - 'AGENTS.md'
      - 'LICOES-APRENDIDAS.md'
      - '.agents/**'
      - '.codex/README.md'
      - 'docs/AI-AGENTS-CATALOG.md'
      - 'docs/AI-DELEGATION-FLOW.md'
      - 'docs/AI-GOVERNANCE-AND-REGRESSION.md'
      - 'docs/AI-SKILLS-CATALOG.md'
      - 'docs/AI-SOURCE-AUDIT.md'
      - 'docs/AI-WIP-TRACKER.md'
      - 'docs/ROADMAP.md'
      - 'docs/ROADMAP-DECISIONS.md'
      - 'docs/ai-operating-model.md'
      - 'tests/python/ai_assets_validator_test.py'
      - 'tests/python/ai_lessons_test.py'
      - 'tests/python/ai_roadmap_test.py'
      - 'tests/python/ai_worklog_test.py'
      - 'scripts/ai-lessons.py'
      - 'scripts/ai_lessons_lib.py'
      - 'scripts/ai-worklog.py'
      - 'scripts/ai-roadmap.py'
      - 'scripts/ai_roadmap_lib.py'
      - 'scripts/validate-ai-assets.py'
      - 'scripts/validate-ai-assets.ps1'
      - 'Taskfile.yml'
      - '.gitignore'

jobs:
  validate-ai-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AI assets
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task ai:validate:linux
          task ai:eval:smoke:linux
          task ci:workflow:sync:check:linux
          task test:unit:python:linux
          task ai:lessons:check:linux
          task ai:worklog:close:gate:linux
