name: AI Governance

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'LICOES-APRENDIDAS.md'
      - '.agents/**'
      - '.codex/README.md'
      - 'docs/AI-AGENTS-CATALOG.md'
      - 'docs/AI-DELEGATION-FLOW.md'
      - 'docs/AI-GOVERNANCE-AND-REGRESSION.md'
      - 'docs/AI-SKILLS-CATALOG.md'
      - 'docs/AI-SOURCE-AUDIT.md'
      - 'docs/AI-WIP-TRACKER.md'
      - 'ROADMAP.md'
      - 'docs/ROADMAP-DECISIONS.md'
      - 'docs/TASKS.md'
      - 'docs/WORKFLOWS.md'
      - 'docs/ai-operating-model.md'
      - 'tests/python/ai_assets_validator_test.py'
      - 'tests/python/ai_dispatch_test.py'
      - 'tests/python/ai_eval_smoke_test.py'
      - 'tests/python/ai_lessons_test.py'
      - 'tests/python/ai_roadmap_test.py'
      - 'tests/python/ai_worklog_test.py'
      - 'tests/python/workflow_task_sync_test.py'
      - 'scripts/ai_dispatch_lib.py'
      - 'scripts/ai-chat-intake.py'
      - 'scripts/ai-route.py'
      - 'scripts/ai-delegate.py'
      - 'scripts/ai-eval-smoke.py'
      - 'scripts/ai-lessons.py'
      - 'scripts/ai_lessons_lib.py'
      - 'scripts/ai-worklog.py'
      - 'scripts/ai-roadmap.py'
      - 'scripts/ai_roadmap_lib.py'
      - 'scripts/validate-ai-assets.py'
      - 'scripts/validate-ai-assets.ps1'
      - 'scripts/validate_workflow_task_sync.py'
      - 'Taskfile.yml'
      - '.gitignore'
  push:
    paths:
      - 'AGENTS.md'
      - 'LICOES-APRENDIDAS.md'
      - '.agents/**'
      - '.codex/README.md'
      - 'docs/AI-AGENTS-CATALOG.md'
      - 'docs/AI-DELEGATION-FLOW.md'
      - 'docs/AI-GOVERNANCE-AND-REGRESSION.md'
      - 'docs/AI-SKILLS-CATALOG.md'
      - 'docs/AI-SOURCE-AUDIT.md'
      - 'docs/AI-WIP-TRACKER.md'
      - 'ROADMAP.md'
      - 'docs/ROADMAP-DECISIONS.md'
      - 'docs/TASKS.md'
      - 'docs/WORKFLOWS.md'
      - 'docs/ai-operating-model.md'
      - 'tests/python/ai_assets_validator_test.py'
      - 'tests/python/ai_dispatch_test.py'
      - 'tests/python/ai_eval_smoke_test.py'
      - 'tests/python/ai_lessons_test.py'
      - 'tests/python/ai_roadmap_test.py'
      - 'tests/python/ai_worklog_test.py'
      - 'tests/python/workflow_task_sync_test.py'
      - 'scripts/ai_dispatch_lib.py'
      - 'scripts/ai-chat-intake.py'
      - 'scripts/ai-route.py'
      - 'scripts/ai-delegate.py'
      - 'scripts/ai-eval-smoke.py'
      - 'scripts/ai-lessons.py'
      - 'scripts/ai_lessons_lib.py'
      - 'scripts/ai-worklog.py'
      - 'scripts/ai-roadmap.py'
      - 'scripts/ai_roadmap_lib.py'
      - 'scripts/validate-ai-assets.py'
      - 'scripts/validate-ai-assets.ps1'
      - 'scripts/validate_workflow_task_sync.py'
      - 'Taskfile.yml'
      - '.gitignore'

jobs:
  validate-ai-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Run canonical AI governance gate
        run: |
          task ci:ai:check:linux
          task test:unit:python:linux
