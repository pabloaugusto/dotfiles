name: Quality Foundation

on:
  pull_request:
  push:

jobs:
  shell-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Task
        uses: go-task/setup-task@v2

      - name: Run canonical Linux quality gate
        run: task ci:quality:linux

  powershell-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Task
        uses: go-task/setup-task@v2

      - name: Ensure Pester
        shell: pwsh
        run: |
          if (-not (Get-Command Invoke-Pester -ErrorAction SilentlyContinue)) {
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run canonical Windows quality gate
        shell: pwsh
        run: task ci:quality:windows
