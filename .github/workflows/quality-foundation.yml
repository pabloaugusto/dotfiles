name: Quality Foundation

on:
  pull_request:
  push:

jobs:
  shell-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Run Linux lint baseline
        run: task ci:lint:linux

  powershell-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Ensure Pester
        shell: pwsh
        run: |
          if (-not (Get-Command Invoke-Pester -ErrorAction SilentlyContinue)) {
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run PowerShell lint
        shell: pwsh
        run: task ci:lint:windows

      - name: Validate AI assets
        shell: pwsh
        run: task ai:validate:windows

      - name: Run Pester
        shell: pwsh
        run: task test:unit:powershell
