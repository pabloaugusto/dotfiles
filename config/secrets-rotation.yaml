version: 1

policy:
  source_of_truth: "1password"
  private_keys_permanent_local_storage: false
  rotation_strategy: "blue_green"
  bootstrap_recovery_refs:
    - "1password.service-account"
    - "age.key"
    - "github.project-pat"
    - "github.full-access-token-fallback"
    - "git-signing.automation-public-key"

audit:
  state_path: "~/.config/dotfiles/secrets-rotation.audit.sops.yaml"
  report_path: ".cache/secrets-rotation/last-report.json"

notification:
  enabled: false
  mode: "smtp_op_refs"
  smtp_host_ref: ""
  smtp_port_ref: ""
  smtp_username_ref: ""
  smtp_password_ref: ""
  from_ref: ""
  to_ref: ""

targets:
  github-ssh-auth:
    enabled: true
    kind: "github_ssh_identity"
    automation: "fully_automated"
    order: 10
    source_of_truth: "1password"
    op_vault: "secrets"
    op_item_title_prefix: "dotfiles-github-auth"
    github_title_prefix: "dotfiles-github-auth"
    publication_kind: "authentication"
    validate_remote: "origin"
    prune_previous: true

  github-ssh-signing:
    enabled: true
    kind: "github_ssh_identity"
    automation: "fully_automated"
    order: 20
    source_of_truth: "1password"
    op_vault: "secrets"
    op_item_title_prefix: "dotfiles-github-signing"
    github_title_prefix: "dotfiles-github-signing"
    publication_kind: "signing"
    prune_previous: true

  age-runtime:
    enabled: true
    kind: "age_runtime_key"
    automation: "fully_automated"
    order: 30
    source_of_truth: "1password"
    ref_key: "age.key"
    backup_vault: "secrets"
    backup_title_prefix: "dotfiles-age-backup"
    sops_config_path: "app/df/secrets/dotfiles.sops.yaml"
    encrypted_artifacts:
      - path: "~/.env.local.sops"
        input_type: "dotenv"

  onepassword-service-account:
    enabled: true
    kind: "onepassword_service_account"
    automation: "assisted"
    order: 40
    source_of_truth: "1password"
    ref_key: "1password.service-account"
    service_account_name_prefix: "dotfiles-bootstrap"
    expires_in: "90d"
    vault_permissions:
      - "secrets:read_items,write_items"
    backup_vault: "secrets"
    backup_title_prefix: "dotfiles-service-account-backup"

  github-project-pat:
    enabled: true
    kind: "github_pat"
    automation: "assisted"
    order: 50
    source_of_truth: "1password"
    ref_key: "github.project-pat"
    preferred_model: "fine_grained"
    validate_endpoint: "user"

  gitlab-token:
    enabled: false
    kind: "gitlab_pat"
    automation: "fully_automated"
    order: 60
    source_of_truth: "1password"
    token_name: "dotfiles"
    glab_user: "@me"

  gitlab-ssh-auth:
    enabled: false
    kind: "gitlab_ssh_identity"
    automation: "fully_automated"
    order: 70
    source_of_truth: "1password"
    op_vault: "secrets"
    op_item_title_prefix: "dotfiles-gitlab-auth"
    gitlab_title_prefix: "dotfiles-gitlab-auth"
    prune_previous: true
