version: 1

metadata:
  contract_id: runtime-secrets-cache
  owner_role: ai-engineering-architect
  status: ready-for-dot-87
  source_of_truth:
    config: config/runtime-secrets-cache.yaml
    explainer: docs/atlassian-ia/artifacts/onepassword-runtime-cache-contract.md

principles:
  - use-1password-cli-cache-first
  - reduce-command-count-at-dotfiles-layer
  - keep-sensitive-values-out-of-disk-cache
  - allow-persistent-cache-only-for-public-material-or-non-sensitive-metadata
  - explicit-invalidation-beats-implicit-retry

platforms:
  windows_host:
    state_root: "%LOCALAPPDATA%/dotfiles/state/secrets"
  wsl_unix:
    state_root: "$XDG_STATE_HOME/dotfiles/secrets"
  fallback_unix:
    state_root: "$HOME/.local/state/dotfiles/secrets"

sources:
  encrypted_runtime_authority:
    allowed:
      - "$HOME/.env.local.sops"
      - user_env:SOPS_AGE_KEY
      - user_env:SOPS_AGE_KEY_FILE
    note: fonte cifrada de runtime; nao conta como cache plaintext

classes:
  - key: public_material
    description: material publico ou operacionalmente nao sensivel
    examples:
      - git_signing_public_key
    allowed_locations:
      - worktree_git_config
      - state_file
      - process_memory
    persistence: persistent
    ttl_seconds: 0
    refresh_strategy: ref_change_or_explicit
    invalidation:
      - public_key_ref_changed
      - public_key_mismatch
      - explicit_refresh

  - key: session_metadata
    description: metadados de sessao, health-check e diagnostico
    examples:
      - op_whoami_success
      - op_ratelimit_snapshot
      - gh_auth_status
    allowed_locations:
      - state_file
      - process_memory
      - shell_environment
    persistence: ttl
    ttl_seconds: 300
    refresh_strategy: ttl_or_explicit
    invalidation:
      - ttl_expired
      - auth_failure
      - account_context_changed
      - explicit_refresh

  - key: session_secret
    description: segredo sensivel para sessao interativa local
    examples:
      - gh_token_fallback
      - github_token_fallback
      - op_service_account_token_in_shell
    allowed_locations:
      - process_memory
      - shell_environment
    persistence: session_only
    ttl_seconds: 0
    refresh_strategy: missing_or_explicit
    invalidation:
      - shell_exit
      - auth_failure
      - explicit_refresh
    persist_to_disk: false

rules:
  op_cli:
    op_cache_required: true
    note: >
      Em UNIX-like, o cache nativo do 1Password CLI fica ligado por padrao.
      Em Windows, como o CLI nao oferece o mesmo cache entre comandos, o
      runtime local precisa compensar com menos chamadas e cache proprio
      apenas para metadados e material permitido.
  resolution_order:
    - existing_process_env
    - shell_session_cache
    - encrypted_runtime_authority
    - onepassword_cli
  prohibited:
    - plaintext_secret_disk_cache
    - op_read_in_interactive_hot_path_when_cache_is_fresh
    - duplicate_health_checks_per_shell_without_ttl

observability:
  required_fields:
    - cache_source
    - cache_scope
    - refreshed_at
    - invalidation_reason
  redact_values: true

implementation_targets:
  dot_86:
    outcome: approved_contract
  dot_87:
    order:
      - powershell_checkenv
      - bash_checkenv
      - github_token_fallback
      - git_signing_public_key
      - secrets_manager_dispatch
