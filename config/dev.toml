version = 1

[context]
kind = "dev"

[paths]
legacy_ai_root = "config/ai"
runtime_root = "app"
agents_root = ".agents"

[legacy_sources]
platforms = "config/ai/platforms.yaml"
jira_model = "config/ai/jira-model.yaml"
