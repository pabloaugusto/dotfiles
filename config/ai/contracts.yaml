version: 1

startup_governance:
  zero_context_resume:
    required: true
    mandatory_manifest: docs/AI-STARTUP-GOVERNANCE-MANIFEST.md
    session_runbook: docs/AI-STARTUP-AND-RESTART.md
    chat_contracts_register: docs/AI-CHAT-CONTRACTS-REGISTER.md
    mandatory_rules:
      - read-every-text-file-resolved-by-the-startup-governance-manifest
      - do-not-operate-by-sampling-memory-or-guessing-after-zero-context-resume
      - recalculate-open-branches-and-worktrees-before-draining-dirty-tree
      - cross-check-each-open-trail-with-its-real-jira-context-before-committing
      - load-chat-communication-contract-before-first-user-facing-message
      - load-display-name-layer-before-chat-jira-or-confluence-visible-communication
      - load-git-governance-contracts-before-changing-worktree-state
      - validate-gh-auth-and-graphql-before-github-pr-or-merge-operations
      - remember-and-apply-the-documented-github-pat-fallback-chain
      - snapshot-current-branch-worktree-and-open-pr-state-at-startup
      - capture-current-branch-lifecycle-upstream-and-main-absorption-state
      - detect-drift-between-active-execution-worklog-branch-and-dirty-tree
      - capture-minimum-operational-health-of-jira-and-confluence-at-startup
      - remember-atlassian-auth-mode-cloud-id-and-recovery-path
      - no-subagent-delegation-before-startup-context-is-loaded-and-scoped
      - subagent-context-pack-must-carry-owner-issue-startup-artifacts-and-applicable-rules
      - startup-must-load-prompts-catalog-and-applicable-formal-pea-pack
      - startup-report-must-expose-pea-status
      - subagent-context-pack-must-carry-pea-classification-when-applicable
      - work-started-without-full-startup-context-is-rejectable
      - warn-user-when-chat-origin-contracts-still-lack-official-promotion
      - keep-a-lived-register-of-chat-origin-contracts-not-yet-promoted
    trigger_examples:
      - power-outage
      - codex-crash
      - cache-clear
      - session-clear
      - app-restart
      - model-restart
      - worktree-switch-without-reliable-carry-over

pre_execution_alignment:
  source_of_truth:
    catalog: .agents/prompts/CATALOG.md
    formal_packs_root: .agents/prompts/formal
    canonical_pack: .agents/prompts/formal/pea-startup-governance/prompt.md
  execution_modes:
    - fast_lane
    - alinhamento_resumido_e_execucao
    - aguardando_confirmacao_humana
    - bloqueado_por_pre_condicao
  mandatory_rules:
    - distinguish-startup-pre-execution-alignment-and-enforcement
    - structural-or-persistent-work-must-run-pre-execution-alignment-before-execution
    - missing-owner-issue-or-dedupe-preflight-must-block-execution
    - startup-must-load-prompts-catalog-and-applicable-formal-pea-pack
    - startup-report-must-expose-pea-status
    - subagent-context-pack-must-carry-pea-classification-when-applicable
    - human-bypass-may-skip-conversational-confirmation-but-not-operational-guardrails

backlog:
  system_of_record: jira
  fallback_tracker: docs/AI-WIP-TRACKER.md
  issue_creation_policy: product-owner-only
  require_issue_before_execution: true
  pull_model: true
  subtask_creation_policy: any-authorized-agent
  intake_creation_preflight:
    mandatory_checks:
      - verify-existing-open-issue-before-any-new-issue
      - verify-existing-open-epic-before-any-non-epic-demand
      - verify-existing-open-epic-before-any-new-epic-for-the-same-theme
      - reuse-existing-open-epic-when-the-theme-is-already-covered
    bypass_policy:
      allowed_when:
        - direct-human-order
        - human-consulted-before-opening-a-new-epic-despite-an-open-match
        - ai-autonomous-decision-after-three-minutes-without-human-response
      mandatory_evidence:
        - record-jql-or-equivalent-search-used-for-issue-and-epic-preflight
        - record-why-existing-issue-or-open-epic-did-not-cover-the-demand
        - record-bypass-rationale-in-jira-comment
  pending_action_policy:
    concluir_primeiro:
      meaning: concluir o item em curso ou puxar apenas o work item minimo que o destrava diretamente
      forbids:
        - pull-unrelated-new-work-while-active-item-remains-blocked
    roadmap_pendente:
      meaning: manter a retomada rastreada no roadmap somente quando a rodada atual realmente nao vai continuar agora

fallback_operation:
  source_of_truth: jira
  local_trackers:
    - docs/AI-WIP-TRACKER.md
    - docs/ROADMAP-DECISIONS.md
  recovery_ledger: docs/AI-FALLBACK-LEDGER.md
  explicit_modes:
    - primary
    - degraded
    - recovery
  resolution_states:
    - drained
    - reconciled
    - obsolete
  mandatory_rules:
    - local-fallback-only-allowed-when-primary-jira-flow-is-objectively-degraded
    - every-real-fallback-usage-must-hit-the-recovery-ledger
    - jira-return-must-trigger-directed-reconciliation
    - every-active-fallback-record-must-end-as-drained-reconciled-or-obsolete
    - primary-mode-requires-zero-active-fallback-records

git_governance:
  source_of_truth: jira
  fallback_tracker: docs/AI-WIP-TRACKER.md
  branch_pattern: <type>/<jira-key>-<slug>
  commit_title_contract: emoji-plus-conventional-plus-single-jira-key
  pr_title_contract: emoji-plus-conventional-plus-single-jira-key
  prompt_namespace:
    prompts_root: .agents/prompts
    task_id_pattern: prompt/<slug>
    branch_pattern: prompt/<jira-key>-<slug>
    branch_type: prompt
    commit_scope: prompt
    pr_scope: prompt
    jira_summary_prefix: "PROMPT:"
    jira_required_labels:
      - prompt
  mandatory_rules:
    - jira-is-primary-system-of-record-for-live-flow
    - ai-wip-tracker-is-fallback-only
    - every-commit-must-map-to-one-real-jira-work-item
    - every-pr-must-map-to-one-real-jira-work-item
    - versioned-prompt-packs-must-declare-task-id-as-prompt-slug
    - changes-touching-agents-prompts-must-use-prompt-branch-type
    - changes-touching-agents-prompts-must-use-prompt-scope-in-commit-title
    - changes-touching-agents-prompts-must-use-prompt-scope-in-pr-title
    - prompt-related-jira-issues-must-use-summary-prefix-prompt
    - prompt-related-jira-issues-must-carry-prompt-label
    - commits-must-be-atomic-contextualized-and-preferably-self-testable
    - resume-old-work-on-a-new-branch-from-main-unless-evidence-keeps-the-existing-branch-valid
    - prune-unneeded-local-branches-and-worktrees-after-merge
    - fail-when-local-merged-branches-or-worktrees-remain-without-purpose

documentation:
  system_of_record: confluence
  repo_docs_mode: espelho-essencial
  require_bidirectional_links: true
  artifact_governance:
    mode: repo-first-then-sync
    owner_role: ai-documentation-agent
    migration_bundle:
      required: true
      format: zip
      attach_to_jira_issue: true
      link_from_confluence_page: true
    required_before_apply:
      - jira-schema-artifact
      - confluence-schema-artifact
      - endpoint-catalog-artifact
      - migration-bundle-plan
    required_before_seed:
      - jira-schema-synced
      - confluence-schema-synced
      - migration-bundle-attached
    enforcement:
      - no-schema-apply-without-repo-artifact
      - no-seed-without-artifact-sync-plan
      - every-generated-asset-must-be-documented
      - every-export-batch-must-have-auditable-bundle
  linking_contract:
    owner_role: ai-documentation-agent
    required_links:
      - jira-issue-to-confluence-page
      - confluence-page-to-jira-issue
    enforcement:
      - no-done-without-doc-link-or-explicit-na
      - no-doc-page-without-related-issue-when-work-driven
      - comments-must-capture-doc-links-when-created-or-updated

workflow:
  always_enabled_columns:
    - Backlog
    - Refinement
    - Ready
    - Doing
    - Testing
    - Review
    - Changes Requested
    - Done
  optional_columns:
    - name: SEO Review
      enabled_when_role: ai-seo-specialist
  definition_of_ready:
    - descricao-clara
    - contexto-tecnico
    - criterios-de-aceitacao
    - escopo-definido
    - links-de-documentacao
  evidence_comment_types:
    - progress-update
    - technical-decision
    - unexpected-finding
    - documentation-link
    - test-evidence
    - test-failure
    - test-success
    - review-feedback
    - approval
    - blocker
    - schema-artifact
  operating_rules:
    - board-read-order-is-right-to-left
    - prioritize-finishing-or-directly-unblocking-active-work-before-pulling-new-work
    - direct-unblocking-work-item-may-be-pulled-when-it-is-the-minimal-dependency-of-active-work
    - do-not-pull-unrelated-new-work-while-blocked-active-item-exists
    - creation-preflight-must-check-existing-open-issue-and-open-epic
    - non-epic-demand-must-reuse-existing-open-epic-when-theme-already-has-one
    - new-epic-requires-proof-that-no-open-epic-already-covers-the-theme
    - bypass-of-epic-reuse-or-deduplication-must-be-commented-and-traceable
    - status-represents-flow-phase
    - current-agent-role-represents-active-ownership
    - board-must-be-read-right-to-left
    - finish-before-start-is-mandatory
    - idle-agents-must-attack-rightmost-finishable-work
    - only-ready-can-be-pulled
    - only-one-active-doing-item-per-agent
    - scrum-master-must-monitor-board-wip-communication-and-ceremony-compliance
  board_operation:
    reading_order: right-to-left
    pull_strategy: finish-before-start
    dispatch_owner_role: ai-scrum-master
    capacity_partner_role: ai-engineering-manager
    priority_ladder:
      - rightmost-unblocked-item-first
      - advance-testing-review-done-before-ready
      - delegate-idle-agents-to-finishable-work
      - treat-stalled-doing-before-pulling-backlog
      - pull-from-ready-only-when-no-rightward-advance-is-possible

agent_activity:
  system_of_record:
    execution_activity: jira-comment-and-attachment
    documentation_activity: confluence-page-and-jira-comment
  local_runtime:
    active_context_file: .cache/ai/active-execution.json
    enforcement:
      - local-context-must-exist-while-an-agent-is-actively-executing
      - local-context-must-match-the-current-jira-issue-and-agent
      - local-context-must-be-cleared-on-handoff-pause-or-done
  required_comment_fields:
    - Agent
    - Interaction Type
    - Status
    - Contexto
    - Evidencias
    - Proximo passo
  required_on_every_touch:
    - structured-comment
    - evidence-or-explicit-na
    - current-and-next-role-synced
    - scrum-master-must-be-able-to-audit-the-touch-from-live-or-versioned-evidence
    - local-context-created-or-refreshed-when-there-is-an-active-agent
  mandatory_before_transition:
    - structured-comment-recorded
    - evidence-linked-or-attached
    - next-required-role-defined-or-explicit-na
    - local-context-synced-with-the-active-agent-before-the-transition
  mandatory_before_done:
    - qa-evidence-or-explicit-na
    - reviewer-approval
    - documentation-link-or-explicit-na
    - local-context-cleared
  accepted_evidence:
    - jira-attachment
    - jira-comment-link
    - commit-link
    - pull-request-link
    - pipeline-link
    - test-log
    - screenshot
    - confluence-page-link
    - migration-bundle-attachment
  reject_when:
    - comment-without-proof
    - generic-status-update-without-context
    - handoff-without-next-role
    - done-without-doc-trace

operator_chat_visibility:
  enabled: true
  owner_role: ai-scrum-master
  mandatory_rules:
    - every-meaningful-agent-milestone-must-be-mirrored-to-chat
    - scrum-master-must-audit-chat-contract-compliance
    - scrum-master-must-report-dysfunctions-and-ceremonies-to-chat
    - chat-summary-does-not-replace-jira-or-confluence-logging

agent_identity:
  source_of_truth: .agents/registry/*.toml::display_name
  card_title_mirror_required: true
  fallback_display: technical-id
  operating_rules:
    - official-display-name-must-live-in-registry
    - card-title-must-mirror-official-display-name-when-defined
    - chat-must-prefer-display-name-over-technical-id
    - startup-and-restart-must-load-display-name-layer
    - jira-must-prefer-display-name-when-surface-allows
    - technical-id-remains-internal-automation-key

scrum_master_enforcement:
  canonical_ledger: docs/AI-SCRUM-MASTER-LEDGER.md
  mandatory_rules:
    - every-dysfunction-must-hit-ledger
    - every-ceremony-must-hit-ledger
    - unresolved-dysfunction-must-open-governance-bug
    - scrum-master-must-link-ledger-and-jira-when-escalating
  inconformity_fields:
    - Data/Hora UTC
    - Tipo
    - Inconformidade
    - Agente/Papel
    - Impacto
    - Acao corretiva
    - Resultado
    - Jira
  ceremony_fields:
    - Data/Hora UTC
    - Cerimonia
    - Contexto
    - Participantes
    - Artefato
    - Resultado
    - Jira/Confluence

ceremonies:
  root: .agents/cerimonias
  log_root: .agents/cerimonias/logs
  owner_role: ai-scrum-master
  mandatory_rules:
    - retrospective-required-for-every-closed-branch
    - every-ceremony-must-generate-markdown-log
    - uncataloged-problem-must-create-jira-issue
    - new-issues-from-ceremony-must-carry-cerimonia-and-ceremony-name-labels
  retrospective:
    title: Retrospectiva
    trigger: every-branch-finished
    fallback_trigger: accumulated-problems-justify
    labels:
      - cerimonia
      - retrospectiva
    confluence:
      root_page: Cerimonias
      tree_path:
        - retrospectiva
        - historico
      title_template: Retrospectiva - {yyyy-MM-dd HH:mm}

testing:
  required_layers:
    - api
  optional_layers:
    - name: browser-validation
      tool: playwright
      enabled_when_role: ai-browser-validator
