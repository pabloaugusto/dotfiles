sync_contract:
  mode: repo-first-then-sync
  manager_role: ai-documentation-manager
  delivery_role: ai-documentation-sync
  required_for_seed:
    - jira-schema
    - confluence-schema
    - endpoint-catalog
    - agent-operations
    - migration-bundle
  required_cross_links:
    - confluence-page-to-jira-issue
    - jira-issue-to-confluence-page
  mirror_policy:
    keep_repo_artifact: true
    sync_to_confluence: true
    sync_jira_comment_or_attachment: true
