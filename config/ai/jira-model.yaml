version: 1

metadata:
  model_id: ai-control-plane-atlassian-pilot
  owner_role: ai-product-owner
  source_of_truth:
    backlog: jira
    documentation: confluence

project:
  key: DOT
  name: dotfiles
  style: company-managed-software
  target_board:
    name: DOT - Autonomous Engineering
    type: kanban
    project_key: DOT
    layout_confirmed: true
    card_layout_fields:
      - Current Agent Role
      - Next Required Role
      - Priority
      - Work Kind
    board_api_scopes:
      - read:project:jira
      - read:board-scope:jira-software
      - write:board-scope:jira-software
      - read:board-scope.admin:jira-software
      - write:board-scope.admin:jira-software
    columns:
      - name: Backlog
        statuses:
          - Backlog
      - name: Refinement
        statuses:
          - Refinement
      - name: Ready
        statuses:
          - Ready
      - name: Doing
        statuses:
          - Doing
      - name: Paused
        statuses:
          - Paused
      - name: Testing
        statuses:
          - Testing
      - name: Review
        statuses:
          - Review
      - name: Changes Requested
        statuses:
          - Changes Requested
      - name: Done
        statuses:
          - Done
          - Cancelled
    optional_columns:
      - name: SEO Review
        enabled_when_role: ai-seo-specialist
        statuses:
          - SEO Review
    swimlanes:
      mode: epic
    quick_filters:
      - name: Blocked
        jql: 'labels = blocked OR Flagged = Impediment'
      - name: Needs Docs
        jql: 'labels = docs-needed OR component = "documentation-governance"'
      - name: Ready for Dev
        jql: 'status = Ready AND "Next Required Role" in ("ai-developer-python", "ai-developer-powershell", "ai-developer-automation", "ai-developer-config-policy")'
      - name: Ready for QA
        jql: 'status = Testing AND "Next Required Role" = "ai-qa"'
      - name: Ready for Review
        jql: 'status = Review AND "Next Required Role" in ("ai-reviewer", "ai-reviewer-python", "ai-reviewer-powershell", "ai-reviewer-automation", "ai-reviewer-config-policy")'
      - name: Ready for Python Review
        jql: 'status = Review AND "Next Required Role" = "ai-reviewer-python"'
      - name: Ready for PowerShell Review
        jql: 'status = Review AND "Next Required Role" = "ai-reviewer-powershell"'
      - name: Ready for Automation Review
        jql: 'status = Review AND "Next Required Role" = "ai-reviewer-automation"'
      - name: Ready for Config Review
        jql: 'status = Review AND "Next Required Role" = "ai-reviewer-config-policy"'
      - name: Paused
        jql: 'status = Paused'
      - name: Needs Spike
        jql: 'status = Refinement AND issuetype in (Story, Task)'
      - name: Needs PO
        jql: '"Current Agent Role" = "ai-product-owner" OR "Next Required Role" = "ai-product-owner"'

issue_types:
  standard:
    - Epic
    - Story
    - Task
    - Bug
    - Spike
    - Sub-task
  target_usage:
    Epic:
      purpose: iniciativa ou frente de entrega
    Story:
      purpose: entrega funcional refinada
    Task:
      purpose: entrega tecnica, operacional ou de governanca
    Bug:
      purpose: defeito, regressao ou incidente
    Spike:
      purpose: pesquisa, discovery, benchmark e reducao de incerteza
    Sub-task:
      purpose: decomposicao autorizada dentro de item pai
  policies:
    top_level_creation: ai-product-owner-only
    subtask_creation: any-authorized-agent
  hierarchy_rules:
    - use-epics-for-small-to-medium-contexts
    - prefer-parent-over-mass-relates-for-context-grouping
    - prefer-stories-for-business-rules-global-definitions-and-user-facing-value
    - prefer-tasks-for-technical-operational-and-governance-work
    - prefer-bugs-for-defects-and-regressions
    - prefer-spikes-for-research-and-refinement-evidence
    - use-subtasks-only-for-execution-breakdown
  spike_policy:
    story_default: required
    task_default: conditional
    gating_status: Refinement
    parent_cannot_leave_refinement_until_required_spike_is_done: true
    required_sections:
      - Perguntas de pesquisa
      - Achados
      - Evidencias
      - Viabilidade
      - Riscos
      - Alternativas
      - Ganhos esperados
      - Custo operacional
      - Pendencias abertas
      - Recomendacao
      - Referencias
  narrative_schema:
    common_sections:
      - Contexto
      - Resultado esperado
      - Criterios de aceite
      - Referencias
    per_type:
      Epic:
        required_sections:
          - Contexto
          - Resultado esperado
          - Criterios de aceite
        optional_sections:
          - Escopo do epic
          - Medida de progresso
      Story:
        preferred_pattern: card-conversation-confirmation
        required_sections:
          - Historia
          - Contexto
          - Resultado esperado
          - Criterios de aceite
          - Referencias
      Task:
        required_sections:
          - Contexto
          - Resultado esperado
          - Escopo tecnico
          - Criterios de aceite
          - Referencias
      Bug:
        required_sections:
          - Problema observado
          - Impacto
          - Resultado esperado
          - Criterios de aceite
          - Evidencias
      Spike:
        required_sections:
          - Perguntas de pesquisa
          - Achados
          - Evidencias
          - Viabilidade
          - Riscos
          - Alternativas
          - Ganhos esperados
          - Custo operacional
          - Pendencias abertas
          - Recomendacao
          - Referencias
      Sub-task:
        required_sections:
          - Contexto da execucao
          - Entrega esperada
          - Evidencias
          - Dependencias
  epic_contexts:
    - Migracao retroativa Jira e Confluence
    - Workflow DOT e evidencias visuais
    - 1Password, SSH e assinatura Git
    - Governanca operacional de IA
    - Documentacao e backlog retroativo
    - Plataforma de desenvolvimento e qualidade
    - Arquitetura portavel e assistentes

workflow:
  name: DOT - Autonomous Delivery Workflow
  description: Workflow canonico do piloto de control plane autonomo.
  scope: global
  scheme_name: DOT - Autonomous Delivery Workflow Scheme
  statuses:
    - name: Backlog
      category: To Do
    - name: Refinement
      category: To Do
    - name: Ready
      category: To Do
    - name: Doing
      category: In Progress
    - name: Paused
      category: In Progress
    - name: Testing
      category: In Progress
    - name: Review
      category: In Progress
    - name: Changes Requested
      category: In Progress
    - name: Done
      category: Done
    - name: Cancelled
      category: Done
  optional_statuses:
    - name: SEO Review
      category: In Progress
      enabled_when_role: ai-seo-specialist
  blocked_model:
    mode: flag-or-label
    label: blocked
  transitions:
    - from: Backlog
      to: Refinement
      roles:
        - ai-product-owner
        - ai-engineering-architect
        - ai-tech-lead
    - from: Refinement
      to: Ready
      roles:
        - ai-product-owner
    - from: Ready
      to: Doing
      roles:
        - ai-developer-python
        - ai-developer-powershell
        - ai-developer-automation
        - ai-developer-config-policy
        - ai-devops
    - from: Doing
      to: Paused
      roles:
        - ai-engineering-manager
        - ai-tech-lead
        - ai-developer-python
        - ai-developer-powershell
        - ai-developer-automation
        - ai-developer-config-policy
        - ai-devops
    - from: Paused
      to: Doing
      roles:
        - ai-engineering-manager
        - ai-tech-lead
        - ai-developer-python
        - ai-developer-powershell
        - ai-developer-automation
        - ai-developer-config-policy
        - ai-devops
    - from: Doing
      to: Testing
      roles:
        - ai-qa
    - from: Testing
      to: Review
      roles:
        - ai-reviewer
        - ai-reviewer-python
        - ai-reviewer-powershell
        - ai-reviewer-automation
        - ai-reviewer-config-policy
    - from: Review
      to: Done
      roles:
        - ai-reviewer
        - ai-reviewer-python
        - ai-reviewer-powershell
        - ai-reviewer-automation
        - ai-reviewer-config-policy
        - ai-documentation-agent
        - ai-product-owner
    - from: Review
      to: Cancelled
      roles:
        - ai-product-owner
        - ai-engineering-manager
    - from: Testing
      to: Changes Requested
      roles:
        - ai-qa
        - ai-reviewer
        - ai-reviewer-python
        - ai-reviewer-powershell
        - ai-reviewer-automation
        - ai-reviewer-config-policy
    - from: Review
      to: Changes Requested
      roles:
        - ai-reviewer
        - ai-reviewer-python
        - ai-reviewer-powershell
        - ai-reviewer-automation
        - ai-reviewer-config-policy
        - ai-engineering-architect
    - from: Changes Requested
      to: Doing
      roles:
        - ai-developer-python
        - ai-developer-powershell
        - ai-developer-automation
        - ai-developer-config-policy
        - ai-devops
  execution_rules:
    - only_ready_can_be_pulled
    - status-is-flow-phase-current-agent-role-is-active-ownership
    - every-relevant-operation-must-have-explicit-owner-agent
    - if-no-agent-fits-the-operation-create-or-formalize-one-through-backlog
    - one-active-doing-item-per-agent
    - ordered-lists-must-remain-prioritized
    - new-demand-must-enter-the-right-priority-position
    - product-owner-must-maintain-start-and-due-dates-for-non-subtasks
    - doing-only-for-actively-executing-work
    - clear-current-agent-role-when-no-agent-is-actively-working
    - story-spike-required-before-ready
    - task-spike-is-conditional-but-preferred-when-uncertainty-exists
    - interrupted-work-must-move-to-paused
    - no_execution_without_jira_issue
    - comments_must_register_evidence_and_decisions
    - specialist-review-required-for-relevant-file-families
    - done_requires_docs_link_or_explicit_n_a

fields:
  strategy:
    prefer_native_first: true
    avoid_field_sprawl: true
    definition_of_ready_in_v1: issue-template-and-status-policy
    definition_of_done_in_v1: issue-template-evidence-and-status-policy
  custom_fields:
    - name: Work Kind
      type: single_select
      required: true
      options:
        - feature
        - bug
        - tech-debt
        - automation
        - documentation
        - spike
        - governance
    - name: Workstream
      type: single_select
      required: true
      options:
        - ai-control-plane
        - jira-confluence-integration
        - documentation-governance
        - bootstrap
        - developer-experience
        - cross-platform
        - ci-cd
        - security
    - name: Affected Platforms
      type: multi_select
      required: false
      options:
        - windows
        - linux
        - wsl
        - cross-platform
        - cloud
    - name: Risk
      type: single_select
      required: false
      options:
        - low
        - medium
        - high
        - critical
    - name: Current Agent Role
      type: single_select
      required: false
      options_source: enabled_roles
    - name: Next Required Role
      type: single_select
      required: false
      options_source: enabled_roles
    - name: Confluence Source
      type: url
      required: false
    - name: Evidence Links
      type: paragraph
      required: false
    - name: Automation Mode
      type: single_select
      required: false
      options:
        - human-in-the-loop
        - autonomous-approved
    - name: Needs Design
      type: checkbox
      required: false
      enabled_when_role: ai-designer
    - name: Needs UX Review
      type: checkbox
      required: false
      enabled_when_role: ai-ux-cro-analyst
    - name: Needs SEO Review
      type: checkbox
      required: false
      enabled_when_role: ai-seo-specialist
  native_fields_to_use:
    - Summary
    - Description
    - Labels
    - Components
    - Priority
    - Assignee
    - Reporter
    - Epic Link
    - Parent

components:
  - ai-control-plane
  - jira-confluence-integration
  - documentation-governance
  - bootstrap
  - environment
  - secrets
  - ci
  - developer-experience
  - cross-platform

labels:
  baseline:
    - atlassian-ia
    - bootstrap
    - powershell
    - python
    - automation
    - windows
    - linux
    - wsl
    - ci
    - security
    - docs
    - governance
  operational:
    - blocked
    - docs-needed
    - ready-for-dev
    - ready-for-qa
    - ready-for-review

comments:
  required_rules:
    - every-acting-role-must-comment-before-handoff
    - every-acting-role-must-comment-when-work-starts
    - every-acting-role-must-comment-on-meaningful-progress-while-working
    - every-relevant-operation-must-have-explicit-owner-agent
    - jira-status-must-reflect-real-time-state-of-work
    - jira-status-and-agent-comments-must-stay-in-parity
    - every-comment-must-include-evidence-or-explicit-na
    - paused-transitions-must-explain-stop-and-resume-criteria
    - qa-and-review-comments-must-link-runs-logs-or-checklists
    - documentation-comments-must-link-confluence-or-explicit-na
  template_fields:
    - Agent
    - Interaction Type
    - Status
    - Contexto
    - Evidencias
    - Proximo passo
  evidence_examples:
    - jira-attachment
    - confluence-url
    - commit-url
    - pull-request-url
    - pipeline-url
    - screenshot
    - test-log
  interaction_types:
    - progress-update
    - technical-decision
    - unexpected-finding
    - scope-change
    - priority-change
    - test-evidence
    - test-failure
    - test-success
    - review-feedback
    - approval
    - blocker
    - documentation-link
    - schema-artifact

dashboards:
  - name: DOT - Autonomous Engineering Overview
    gadgets:
      - Filter Results
      - Two Dimensional Filter Statistics
      - Pie Chart
      - Created vs Resolved
      - Activity Stream
  - name: DOT - AI Delivery Ops
    gadgets:
      - Sprint Health
      - Average Age Chart
      - Filter Results
      - Rich Text

apply_order:
  - validar service account e token com scopes de Jira Platform e Jira Software
  - criar ou ajustar statuses alvo
  - criar workflow company-managed e mapear transicoes
  - associar workflow aos issue types padrao
  - criar campos customizados minimos
  - adicionar componentes e labels baseline
  - criar board Kanban com colunas alvo
  - criar dashboards
