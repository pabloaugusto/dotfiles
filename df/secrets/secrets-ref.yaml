---
# Secrets do repositório dotfiles
1password:
  service-account: "op://secrets/dotfiles/1password/service-account"
github:
  # Token de escopo amplo (fallback de emergencia; evitar como padrao do bootstrap)
  full-access-token: "op://secrets/github/api/token"
  # Token dedicado do projeto dotfiles (padrao recomendado para bootstrap/auth do gh)
  project-pat: "op://secrets/dotfiles/github/token"
age:
  key: "op://secrets/dotfiles/age/age.key"
