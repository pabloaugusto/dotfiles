version: 1
agents:
  - id: bootstrap-operator
    domains: [bootstrap, links, config, canonical-paths]
    default_skills: [dotfiles-bootstrap]
  - id: repo-governance-authority
    domains: [contracts, docs, naming, governance, ai-assets]
    default_skills: [dotfiles-repo-governance]
  - id: execution-worklog-governance-owner
    domains: [worklog, roadmap, continuity, closeout]
    default_skills: [wip-continuity-governance]
  - id: architecture-modernization-authority
    domains: [architecture, refactor, performance, simplification, resilience, testability]
    default_skills: [dotfiles-architecture-modernization]
  - id: critical-integrations-guardian
    domains: [auth, secrets, cli, workstation, ci, signing, bootstrap]
    default_skills: [dotfiles-critical-integrations]
  - id: secrets-rotation-governor
    domains: [secret-rotation, token-lifecycle, ssh-keys, sops, age, recovery]
    default_skills: [dotfiles-secrets-rotation]
  - id: python-reviewer
    domains: [python, typing, lint, tests, review]
    default_skills: [dotfiles-python-review]
  - id: powershell-reviewer
    domains: [powershell, bootstrap, windows-host, review]
    default_skills: [dotfiles-powershell-review]
  - id: automation-reviewer
    domains: [shell, workflows, taskfile, docker, ci, review]
    default_skills: [dotfiles-automation-review]
  - id: ai-linguistic-reviewer
    domains: [orthography, terminology, cspell, microcopy, docs, comments, docstrings]
    default_skills: [dotfiles-orthography-review]
  - id: ai-documentation-writer
    domains: [technical-writing, docs, runbooks, adrs, confluence-drafts, narrative]
    default_skills: [dotfiles-repo-governance, dotfiles-lessons-governance]
  - id: ai-documentation-reviewer
    domains: [documentation-review, completeness, semantic-risk, readability, operational-safety]
    default_skills: [dotfiles-repo-governance, dotfiles-architecture-modernization]
  - id: ai-documentation-manager
    domains: [documentation-governance, source-of-truth, placement, lifecycle, deduplication, sync-eligibility]
    default_skills: [dotfiles-repo-governance, dotfiles-architecture-modernization, dotfiles-lessons-governance]
  - id: ai-documentation-sync
    domains: [documentation-sync, confluence, backlinks, documentation-link, bundles, cross-surface-traceability]
    default_skills: [dotfiles-repo-governance, dotfiles-critical-integrations]
  - id: ai-documentation-agent
    domains: [legacy-documentation-compatibility, historical-handoffs]
    default_skills: [dotfiles-repo-governance]
  - id: pascoalete
    domains: [orthography, cspell, vocabulary, docs, comments, review]
    default_skills: [dotfiles-orthography-review]
  - id: lessons-governance-curator
    domains: [lessons, retrospectives, closeout, backfill]
    default_skills: [dotfiles-lessons-governance]
  - id: ai-scrum-master
    domains: [board, wip, ceremonies, governance-enforcement, agent-compliance, communication]
    default_skills: [wip-continuity-governance, dotfiles-repo-governance]
  - id: orchestrator
    domains: [routing, decomposition, delegation, orchestration]
    default_skills: [task-routing-and-decomposition]
mandatory_gates:
  always:
    - repo-governance-authority
    - execution-worklog-governance-owner
    - ai-scrum-master
    - architecture-modernization-authority
  platform_sensitive:
    - critical-integrations-guardian
    - secrets-rotation-governor
