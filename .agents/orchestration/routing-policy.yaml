version: 1
settings:
  multi_agent_default: true
  max_primary_agents: 2
global_mandatory_gates:
  - repo-governance-authority
  - execution-worklog-governance-owner
  - ai-scrum-master
  - architecture-modernization-authority

conditional_mandatory_gates:
  - when_any_path_matches:
      - "bootstrap/**"
      - "df/**"
      - "Taskfile.yml"
      - ".github/workflows/**"
      - "scripts/**"
    agents:
      - critical-integrations-guardian
  - when_any_keyword_matches:
      - "gh"
      - "op"
      - "sops"
      - "age"
      - "ssh-agent"
      - "auth"
      - "secret"
      - "bootstrap"
      - "checkEnv"
      - "signing"
    agents:
      - critical-integrations-guardian
  - when_any_keyword_matches:
      - "rotate"
      - "rotation"
      - "token"
      - "ssh-key"
      - "service-account"
      - "pat"
      - "secret"
      - "secrets"
      - "age"
      - "sops"
    agents:
      - secrets-rotation-governor
  - when_any_path_matches:
      - "df/secrets/**"
      - "bootstrap/secrets/**"
      - "docs/secrets-and-auth.md"
      - "scripts/secrets*"
      - "config/secrets-rotation*"
    agents:
      - secrets-rotation-governor
  - when_any_path_matches:
      - "scripts/*.py"
      - "tests/python/*"
      - ".githooks/ci/*.py"
      - "pyproject.toml"
    agents:
      - python-reviewer
  - when_any_path_matches:
      - "bootstrap/*.ps1"
      - "bootstrap/**/*.ps1"
      - "df/powershell/*.ps1"
      - "df/powershell/**/*.ps1"
      - "scripts/*.ps1"
      - "scripts/**/*.ps1"
      - "tests/powershell/*.ps1"
      - "tests/powershell/**/*.ps1"
    agents:
      - powershell-reviewer
  - when_any_path_matches:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "Taskfile.yml"
      - "Dockerfile"
      - "docker/**"
      - "scripts/*.sh"
      - "scripts/**/*.sh"
      - "bootstrap/*.sh"
      - "bootstrap/**/*.sh"
      - "tests/bash/*"
      - ".githooks/*"
    agents:
      - automation-reviewer
  - when_any_path_matches:
      - "LICOES-APRENDIDAS.md"
      - "docs/AI-WIP-TRACKER.md"
      - "ROADMAP.md"
      - "docs/ROADMAP-DECISIONS.md"
      - "scripts/ai-worklog.py"
      - "scripts/ai-lessons.py"
    agents:
      - lessons-governance-curator

routes:
  - id: route-bootstrap-scope
    match:
      keywords: ["bootstrap", "relink", "refresh", "link", "symlink", "user-config"]
      paths: ["bootstrap/**", "df/**"]
    primary: [bootstrap-operator]
    support: [critical-integrations-guardian, architecture-modernization-authority, pascoalete]
  - id: route-governance-scope
    match:
      keywords: ["governanca", "agents", "skills", "workflow", "docs", "contract", "conventional"]
      paths:
        [
          "AGENTS.md",
          ".agents/**",
          ".codex/README.md",
          "docs/**",
          "Taskfile.yml",
          "scripts/ai-*.py",
          "scripts/validate-ai-assets.py",
          "scripts/validate_docs.py",
          "scripts/validate_workflow_task_sync.py",
        ]
    primary: [repo-governance-authority]
    support: [architecture-modernization-authority, lessons-governance-curator, pascoalete]
  - id: route-documentation-layer-scope
    match:
      keywords:
        ["documentation", "documentacao", "confluence", "documentation-link", "terminologia", "glossario", "cspell", "source of truth", "placement", "lifecycle", "logs vivos", "backlink"]
      paths:
        ["docs/**", ".agents/cards/ai-documentation-*.md", ".agents/cards/pascoalete.md", ".agents/registry/ai-documentation-*.toml", ".agents/registry/pascoalete.toml", "config/ai/confluence-model.yaml", "config/ai/contracts.yaml", "config/ai/sync-targets.yaml"]
    primary: [ai-documentation-manager]
    support: [ai-documentation-reviewer, ai-documentation-writer, ai-documentation-sync, ai-linguistic-reviewer, repo-governance-authority, pascoalete]
  - id: route-scrum-master-scope
    match:
      keywords: ["scrum", "board", "wip", "cerimonia", "retrospectiva", "workflow agil", "kanban"]
      paths:
        [
          ".agents/cards/ai-scrum-master.md",
          ".agents/registry/ai-scrum-master.toml",
          "config/ai/contracts.yaml",
          "config/ai/jira-model.yaml",
          "docs/AI-DELEGATION-FLOW.md",
          "docs/AI-GOVERNANCE-AND-REGRESSION.md",
        ]
    primary: [ai-scrum-master]
    support: [repo-governance-authority, execution-worklog-governance-owner, architecture-modernization-authority, ai-reviewer-config-policy, pascoalete]
  - id: route-secrets-rotation-scope
    match:
      keywords: ["rotate", "rotation", "token", "service-account", "ssh-key", "sops", "age", "secret"]
      paths: ["df/secrets/**", "bootstrap/secrets/**", "docs/secrets-and-auth.md", "scripts/secrets*", "config/secrets-rotation*"]
    primary: [secrets-rotation-governor]
    support: [critical-integrations-guardian, architecture-modernization-authority, lessons-governance-curator, pascoalete]
  - id: route-continuity-scope
    match:
      keywords: ["wip", "doing", "done", "roadmap", "continuity", "lessons", "retroativo"]
      paths: ["LICOES-APRENDIDAS.md", "docs/AI-WIP-TRACKER.md", "ROADMAP.md", "docs/ROADMAP-DECISIONS.md", "scripts/ai-*.py"]
    primary: [execution-worklog-governance-owner, lessons-governance-curator]
    support: [repo-governance-authority, pascoalete]
  - id: route-orchestrator-scope
    match:
      keywords: ["planejar", "decompor", "delegar", "orquestrar", "rotear", "route", "delegate"]
      paths: ["ROADMAP.md", "docs/WORKFLOWS.md", "docs/TASKS.md"]
    primary: [orchestrator]
    support: [repo-governance-authority, architecture-modernization-authority, pascoalete]
