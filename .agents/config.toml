version = 1

[skills]
required = [
  "dotfiles-bootstrap",
  "dotfiles-repo-governance",
  "dotfiles-test-harness",
  "wip-continuity-governance",
  "dotfiles-architecture-modernization",
  "dotfiles-critical-integrations",
  "dotfiles-secrets-rotation",
  "dotfiles-lessons-governance",
  "task-routing-and-decomposition",
  "dotfiles-python-review",
  "dotfiles-powershell-review",
  "dotfiles-automation-review",
  "dotfiles-orthography-review",
]
mandatory_parallel = ["dotfiles-architecture-modernization"]

[agents]
required = [
  "bootstrap-operator",
  "repo-governance-authority",
  "execution-worklog-governance-owner",
  "architecture-modernization-authority",
  "critical-integrations-guardian",
  "secrets-rotation-governor",
  "lessons-governance-curator",
  "orchestrator",
  "ai-product-owner",
  "ai-startup-governor",
  "ai-scrum-master",
  "ai-engineering-architect",
  "ai-engineering-manager",
  "ai-tech-lead",
  "ai-developer-python",
  "ai-developer-powershell",
  "ai-developer-automation",
  "ai-developer-config-policy",
  "ai-qa",
  "ai-reviewer",
  "ai-reviewer-python",
  "ai-reviewer-powershell",
  "ai-reviewer-automation",
  "ai-reviewer-config-policy",
  "ai-devops",
  "ai-linguistic-reviewer",
  "ai-documentation-writer",
  "ai-documentation-reviewer",
  "ai-documentation-manager",
  "ai-documentation-sync",
  "ai-documentation-agent",
  "python-reviewer",
  "powershell-reviewer",
  "automation-reviewer",
  "pascoalete",
]
mandatory_global = [
  "repo-governance-authority",
  "execution-worklog-governance-owner",
  "ai-scrum-master",
  "architecture-modernization-authority",
]
mandatory_platform = ["critical-integrations-guardian"]

[orchestration]
capability_matrix = ".agents/orchestration/capability-matrix.yaml"
routing_policy = ".agents/orchestration/routing-policy.yaml"
task_card_schema = ".agents/orchestration/task-card.schema.json"
delegation_plan_schema = ".agents/orchestration/delegation-plan.schema.json"

[rules]
default = ".agents/rules/default.rules"
ci = ".agents/rules/ci.rules"
security = ".agents/rules/security.rules"

[evals]
smoke = ".agents/evals/scenarios/smoke.md"
regression = ".agents/evals/scenarios/regression.md"
security = ".agents/evals/scenarios/security.md"
routing_dataset = ".agents/evals/datasets/routing.jsonl"
governance_dataset = ".agents/evals/datasets/governance.jsonl"

[ceremonies]
root = ".agents/cerimonias"
schema = ".agents/cerimonias/ceremony.schema.json"
default_log_root = ".agents/cerimonias/logs"

[identity]
registry_root = ".agents/registry"
display_name_field = "display_name"
card_title_mirror_required = true
fallback_display = "technical-id"
