# app/df/secrets/dotfiles.sops.yaml
#
# README rapido:
# - Este arquivo define regras de criptografia para segredos de runtime dos dotfiles.
# - Chave privada local esperada: app/df/secrets/dotfiles.age.local.key
# - Gere a chave publica com:
#     age-keygen -y app/df/secrets/dotfiles.age.local.key
# - Use este arquivo com:
#     sops --config app/df/secrets/dotfiles.sops.yaml -e -i <arquivo>
#
# Exemplos de comando:
#   sops --config app/df/secrets/dotfiles.sops.yaml -e -i app/df/secrets/local.env
#   sops --config app/df/secrets/dotfiles.sops.yaml -d app/df/secrets/local.env
#
# IMPORTANTE:
# - Recipient canonico atual: age1h8h7zrm90qyg9gruu2fpcnymt4wmac7segpuv7agqncef5c5af3q45wtx3
# - Este arquivo pode ser versionado.
# - Arquivos *.local devem ficar no .gitignore quando nao cifrados.

creation_rules:
  # Segredos dentro de /app/df/secrets
  - path_regex: ^app/df/secrets/.*\.(env|yaml|yml|json|toml|ini)$
    age:
      - age1h8h7zrm90qyg9gruu2fpcnymt4wmac7segpuv7agqncef5c5af3q45wtx3
    encrypted_regex: '^(data|stringData|password|token|secret|private_key)$'

  # Segredos com sufixo ".secret.*" dentro de dotfiles versionados
  - path_regex: ^app/df/.+\.secret\.(env|yaml|yml|json|toml|ini)$
    age:
      - age1h8h7zrm90qyg9gruu2fpcnymt4wmac7segpuv7agqncef5c5af3q45wtx3
