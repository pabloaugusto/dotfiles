  ai:wip:branch:check:
    desc: Alias para ai:worklog:branch:check
    cmds:
      - task: ai:worklog:branch:check
        vars:
          BRANCH: "{{.BRANCH}}"
          OWNER: "{{.OWNER}}"

  conventions:check:pr-title:
    desc: Valida um titulo de PR no padrao emoji + conventional commits
    cmds:
      - task: conventions:check:pr-title:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  conventions:check:pr-title:windows:
    desc: Windows - valida titulo de PR (emoji + conventional + max 72)
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [TITLE]
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-conventional-title.ps1 -Title \"{{.TITLE}}\""

  conventions:check:pr-title:linux:
    desc: Linux/WSL - valida titulo de PR (emoji + conventional + max 72)
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [TITLE]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./.githooks/ci/validate_message.py \"{{.TITLE}}\" --context \"PR title\"'"

  conventions:check:branch:
    desc: Valida nome da branch atual ou da branch informada
    cmds:
      - task: conventions:check:branch:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          BRANCH: "{{.BRANCH}}"

  conventions:check:branch:windows:
    desc: Windows - valida branch atual ou BRANCH
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-branch-name.ps1 -Branch \"{{default \"\" .BRANCH}}\""

  conventions:check:branch:linux:
    desc: Linux/WSL - valida branch atual ou BRANCH
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'branch=\"{{default \"\" .BRANCH}}\"; if [ -z \"$branch\" ]; then branch=\"$(git rev-parse --abbrev-ref HEAD)\"; fi; bash ./scripts/run-python.sh ./.githooks/conventional_emoji.py --validate-branch \"$branch\"'"

  conventions:check:commit:
    desc: Valida o ultimo commit subject ou o SUBJECT informado
    cmds:
      - task: conventions:check:commit:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          SUBJECT: "{{.SUBJECT}}"

  conventions:check:commit:windows:
    desc: Windows - valida commit subject atual ou SUBJECT
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-commit-subject.ps1 -Subject \"{{default \"\" .SUBJECT}}\""

  conventions:check:commit:linux:
    desc: Linux/WSL - valida commit subject atual ou SUBJECT
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'subject=\"{{default \"\" .SUBJECT}}\"; if [ -z \"$subject\" ]; then subject=\"$(git log -1 --format=%s)\"; fi; bash ./scripts/run-python.sh ./.githooks/ci/validate_message.py \"$subject\" --context \"commit subject\"'"

  conventions:check:commits:
    desc: Valida subjects de commits no range informado ou origin/main..HEAD
    cmds:
      - task: conventions:check:commits:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          RANGE: "{{.RANGE}}"

  conventions:check:commits:windows:
    desc: Windows - valida commits do range RANGE ou origin/main..HEAD
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-commit-range.ps1 -Range \"{{default \"\" .RANGE}}\""

  conventions:check:commits:linux:
    desc: Linux/WSL - valida commits do range RANGE ou origin/main..HEAD
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'range=\"{{default \"\" .RANGE}}\"; if [ -z \"$range\" ]; then range=\"origin/main..HEAD\"; fi; subjects_json=\"$(git log --format=%s \"$range\" | bash ./scripts/run-python.sh -c \"import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))\")\"; bash ./scripts/run-python.sh ./.githooks/conventional_emoji.py --validate-many-json \"$subjects_json\" --require-emoji'"

  conventions:check:pr-commits:
    desc: Valida todos os commits de um PR no GitHub via API
    cmds:
      - task: conventions:check:pr-commits:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          REPO: "{{.REPO}}"
          PR: "{{.PR}}"

  conventions:check:pr-commits:windows:
    desc: Windows - valida commits do PR informado via API do GitHub
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [REPO, PR]
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-pr-commits.ps1 -Repo \"{{.REPO}}\" -PrNumber {{.PR}}"

  conventions:check:pr-commits:linux:
    desc: Linux/WSL - valida commits do PR informado via API do GitHub
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [REPO, PR]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./.githooks/ci/validate_pr_commits.py \"{{.REPO}}\" \"{{.PR}}\"'"

