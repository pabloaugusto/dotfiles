version: '3'

env:
  PRE_COMMIT_HOME: .cache/pre-commit
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHONPYCACHEPREFIX: .cache/pycache
  UV_PROJECT_ENVIRONMENT: '{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}.venv/windows{{else}}.venv/linux{{end}}'
  UV_CACHE_DIR: .cache/uv

tasks:
  default:
    desc: Lista tasks disponiveis
    cmds:
      - task --list

  sync:
    desc: Auto - sync inteligente (analisa pendencias, pergunta commit/push e sincroniza via Git)
    cmds:
      - task: sync:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  sync:windows:
    desc: Windows - sync inteligente do repo local (commit por contexto + pull/push guiado)
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesSmartSync\""

  sync:linux:
    desc: Linux/WSL - sync inteligente do repo local (commit por contexto + pull/push guiado)
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh'"

  repo:status:
    desc: Auto - status do repo dotfiles no ambiente atual
    cmds:
      - task: repo:status:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:status:windows:
    desc: Windows - status do repo atual
    platforms: [windows]
    cmds:
      - git -C "{{.TASKFILE_DIR}}" rev-parse --abbrev-ref HEAD
      - git -C "{{.TASKFILE_DIR}}" rev-parse --short HEAD
      - git -C "{{.TASKFILE_DIR}}" status --short

  repo:status:linux:
    desc: Linux/WSL - status do repo atual
    platforms: [linux]
    cmds:
      - git -C "{{.TASKFILE_DIR}}" rev-parse --abbrev-ref HEAD
      - git -C "{{.TASKFILE_DIR}}" rev-parse --short HEAD
      - git -C "{{.TASKFILE_DIR}}" status --short

  repo:update:
    desc: Auto - atualizar repo dotfiles (main + fetch --prune + pull --rebase)
    cmds:
      - task: repo:update:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:update:windows:
    desc: Windows - atualizar repo atual
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoUpdate -SwitchMain\""

  repo:update:linux:
    desc: Linux/WSL - atualizar repo atual
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' update"

  repo:update-safe:
    desc: Auto - atualizar com auto-stash para worktree suja
    cmds:
      - task: repo:update-safe:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:update-safe:windows:
    desc: Windows - atualizar com auto-stash
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoUpdate -Safe -SwitchMain\""

  repo:update-safe:linux:
    desc: Linux/WSL - atualizar com auto-stash
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' update-safe"

  repo:publish:
    desc: Auto - publicar alteracoes (pull --rebase + commit + push)
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          MSG: "{{.MSG}}"

  repo:publish:windows:
    desc: Windows - publicar alteracoes
    platforms: [windows]
    requires:
      vars: [MSG]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoPublish -Message '{{.MSG}}'\""

  repo:publish:linux:
    desc: Linux/WSL - publicar alteracoes
    platforms: [linux]
    requires:
      vars: [MSG]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' publish \"{{.MSG}}\""

  sync:update:
    desc: Auto - alias para repo:update
    cmds:
      - task: repo:update

  sync:update:windows:
    desc: Windows - alias para repo:update:windows
    platforms: [windows]
    cmds:
      - task: repo:update:windows

  sync:update:linux:
    desc: Linux/WSL - alias para repo:update:linux
    platforms: [linux]
    cmds:
      - task: repo:update:linux

  sync:update-safe:
    desc: Auto - alias para repo:update-safe
    cmds:
      - task: repo:update-safe

  sync:update-safe:windows:
    desc: Windows - alias para repo:update-safe:windows
    platforms: [windows]
    cmds:
      - task: repo:update-safe:windows

  sync:update-safe:linux:
    desc: Linux/WSL - alias para repo:update-safe:linux
    platforms: [linux]
    cmds:
      - task: repo:update-safe:linux

  sync:publish:
    desc: Auto - alias para repo:publish
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish
        vars:
          MSG: "{{.MSG}}"

  sync:publish:windows:
    desc: Windows - alias para repo:publish:windows
    platforms: [windows]
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:windows
        vars:
          MSG: "{{.MSG}}"

  sync:publish:linux:
    desc: Linux/WSL - alias para repo:publish:linux
    platforms: [linux]
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:linux
        vars:
          MSG: "{{.MSG}}"

  sync:wsl-gate:
    desc: Auto - gate Git-only para sincronizar Windows repo -> WSL repo local
    cmds:
      - task: sync:wsl-gate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  sync:wsl-gate:windows:
    desc: Windows - gate Git-only para sincronizar repo local do WSL
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Sync-DotfilesWindowsToWsl\""

  sync:wsl-gate:linux:
    desc: Linux/WSL - nao aplicavel (execute sync:wsl-gate no Windows)
    platforms: [linux]
    cmds:
      - bash -lc "echo 'sync:wsl-gate deve ser executado no Windows para sincronizar o clone WSL local via Git.' && exit 1"

  env:check:
    desc: Auto - roda checkEnv no ambiente atual
    cmds:
      - task: env:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  env:check:windows:
    desc: Windows - roda checkEnv no PowerShell
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; checkEnv -GitSigningMode '{{default \"auto\" .SIGN_MODE}}'\""

  env:check:linux:
    desc: Linux/WSL - roda checkEnv no Bash
    platforms: [linux]
    cmds:
      - bash -lc "source '{{.TASKFILE_DIR}}/df/bash/.inc/check-env.sh' && checkEnv '{{default \"auto\" .SIGN_MODE}}'"

  git:signing:status:
    desc: Exibe o estado do signer Git para a worktree atual
    cmds:
      - task: git:signing:status:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  git:signing:status:windows:
    desc: Windows - exibe o estado do signer Git para a worktree atual
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/git-signing-mode.py -Arguments status"

  git:signing:status:linux:
    desc: Linux/WSL - exibe o estado do signer Git para a worktree atual
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/git-signing-mode.py status'"

  git:signing:mode:human:
    desc: Reverte a worktree atual para o signer Git humano padrao
    cmds:
      - task: git:signing:mode:human:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  git:signing:mode:human:windows:
    desc: Windows - reverte a worktree para o signer Git humano
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/git-signing-mode.py -Arguments use-human"

  git:signing:mode:human:linux:
    desc: Linux/WSL - reverte a worktree para o signer Git humano
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/git-signing-mode.py use-human'"

  git:signing:mode:automation:
    desc: Aplica signer tecnico de automacao na worktree atual usando op + SSH agent
    cmds:
      - task: git:signing:mode:automation:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          PUBLIC_KEY_REF: "{{.PUBLIC_KEY_REF}}"
          TITLE: "{{.TITLE}}"
          ENSURE_GITHUB: "{{default \"1\" .ENSURE_GITHUB}}"

  git:signing:mode:automation:windows:
    desc: Windows - aplica signer tecnico de automacao na worktree atual
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/git-signing-mode.py -Arguments use-automation --public-key-ref '{{default \"\" .PUBLIC_KEY_REF}}' --ensure-github '{{default \"1\" .ENSURE_GITHUB}}' --title '{{default \"\" .TITLE}}'"

  git:signing:mode:automation:linux:
    desc: Linux/WSL - aplica signer tecnico de automacao na worktree atual
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/git-signing-mode.py use-automation --public-key-ref \"{{default \"\" .PUBLIC_KEY_REF}}\" --ensure-github \"{{default \"1\" .ENSURE_GITHUB}}\" --title \"{{default \"\" .TITLE}}\"'"

  git:signing:github:ensure:
    desc: Garante que a chave publica do signer tecnico exista no GitHub como signing key
    cmds:
      - task: git:signing:github:ensure:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          PUBLIC_KEY_REF: "{{.PUBLIC_KEY_REF}}"
          TITLE: "{{.TITLE}}"

  git:signing:github:ensure:windows:
    desc: Windows - registra ou reaproveita a signing key tecnica no GitHub
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/git-signing-mode.py -Arguments ensure-github-signing-key --public-key-ref '{{default \"\" .PUBLIC_KEY_REF}}' --title '{{default \"\" .TITLE}}'"

  git:signing:github:ensure:linux:
    desc: Linux/WSL - registra ou reaproveita a signing key tecnica no GitHub
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/git-signing-mode.py ensure-github-signing-key --public-key-ref \"{{default \"\" .PUBLIC_KEY_REF}}\" --title \"{{default \"\" .TITLE}}\"'"

  bootstrap:
    desc: Auto - bootstrap no ambiente atual
    cmds:
      - task: bootstrap:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  bootstrap:windows:
    desc: Windows - bootstrap completo (default)
    platforms: [windows]
    cmds:
      - task: bootstrap:windows:new

  bootstrap:windows:new:
    desc: Windows - bootstrap completo
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \"& '{{.TASKFILE_DIR}}/bootstrap/_start.ps1'\""

  bootstrap:windows:refresh:
    desc: Windows - refresh rapido
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \"& '{{.TASKFILE_DIR}}/bootstrap/_start.ps1' -Refresh\""

  bootstrap:relink:
    desc: Auto - recria os symlinks canonicos do bootstrap no ambiente atual
    cmds:
      - task: bootstrap:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}:relink

  bootstrap:windows:relink:
    desc: Windows - recria symlinks/junctions do bootstrap
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/bootstrap/bootstrap-config.ps1'; if (!(Ensure-BootstrapConfigReady -DotFilesDirectory '{{.TASKFILE_DIR}}')) { exit 1 }; . '{{.TASKFILE_DIR}}/bootstrap/bootstrap-windows.ps1' -RelinkOnly\""

  bootstrap:linux:
    desc: Linux/WSL - bootstrap Ubuntu
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/bootstrap/bootstrap-ubuntu-wsl.sh'"

  bootstrap:linux:relink:
    desc: Linux/WSL - recria symlinks do bootstrap
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/bootstrap/bootstrap-ubuntu-wsl.sh' relink"

  install:dev:
    desc: Instala dependencias Python de desenvolvimento via uv
    cmds:
      - task: install:dev:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  install:dev:windows:
    desc: Windows - sincroniza .venv e dependencias de desenvolvimento via uv
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv sync --locked --all-groups

  install:dev:linux:
    desc: Linux/WSL - sincroniza .venv e dependencias de desenvolvimento via uv
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv sync --locked --all-groups

  lint:python:
    desc: Executa Ruff nos scripts e testes Python do repo
    cmds:
      - task: lint:python:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  lint:python:windows:
    desc: Windows - Ruff check em scripts Python e hooks Python
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ruff check scripts tests/python .githooks/ci --respect-gitignore --force-exclude

  lint:python:linux:
    desc: Linux/WSL - Ruff check em scripts Python e hooks Python
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ruff check scripts tests/python .githooks/ci --respect-gitignore --force-exclude

  format:python:check:
    desc: Verifica formatacao Python canonica com Ruff
    cmds:
      - task: format:python:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  format:python:check:windows:
    desc: Windows - verifica formatacao Python com Ruff
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ruff format scripts tests/python .githooks/ci --check

  format:python:check:linux:
    desc: Linux/WSL - verifica formatacao Python com Ruff
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ruff format scripts tests/python .githooks/ci --check

  type:check:
    desc: Executa type checking com ty
    cmds:
      - task: type:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  type:check:windows:
    desc: Windows - executa ty em scripts e testes Python
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ty check scripts/release_tool.py scripts/validate_docs.py scripts/run_actionlint.py scripts/run_gitleaks.py scripts/run-cspell.py scripts/git-signing-mode.py scripts/git_signing_lib.py scripts/ai-control-plane.py scripts/ai_control_plane_lib.py scripts/ai-session-startup.py scripts/ai_session_startup_lib.py scripts/atlassian_platform_lib.py scripts/ai-atlassian-openapi.py scripts/ai_atlassian_openapi_lib.py scripts/ai-jira-model.py scripts/ai_jira_model_lib.py scripts/ai-jira-apply.py scripts/ai_jira_apply_lib.py scripts/ai-atlassian-backfill.py scripts/ai_atlassian_backfill_lib.py scripts/ai-atlassian-migration-bundle.py scripts/ai_atlassian_migration_bundle_lib.py scripts/ai-atlassian-seed.py scripts/ai_atlassian_seed_lib.py scripts/ai-atlassian-docs-sync.py scripts/ai-agent-execution.py scripts/ai_agent_execution_lib.py scripts/secrets-rotation.py scripts/secrets_rotation_lib.py tests/python/release_tool_test.py tests/python/validate_docs_test.py tests/python/git_signing_mode_test.py tests/python/ai_control_plane_test.py tests/python/ai_session_startup_test.py tests/python/atlassian_platform_test.py tests/python/ai_atlassian_openapi_test.py tests/python/ai_jira_model_test.py tests/python/ai_jira_apply_test.py tests/python/ai_atlassian_backfill_test.py tests/python/ai_atlassian_migration_bundle_test.py tests/python/ai_atlassian_seed_test.py tests/python/ai_agent_execution_test.py tests/python/secrets_rotation_test.py

  type:check:linux:
    desc: Linux/WSL - executa ty em scripts e testes Python
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked ty check scripts/release_tool.py scripts/validate_docs.py scripts/run_actionlint.py scripts/run_gitleaks.py scripts/run-cspell.py scripts/git-signing-mode.py scripts/git_signing_lib.py scripts/ai-control-plane.py scripts/ai_control_plane_lib.py scripts/ai-session-startup.py scripts/ai_session_startup_lib.py scripts/atlassian_platform_lib.py scripts/ai-atlassian-openapi.py scripts/ai_atlassian_openapi_lib.py scripts/ai-jira-model.py scripts/ai_jira_model_lib.py scripts/ai-jira-apply.py scripts/ai_jira_apply_lib.py scripts/ai-atlassian-backfill.py scripts/ai_atlassian_backfill_lib.py scripts/ai-atlassian-migration-bundle.py scripts/ai_atlassian_migration_bundle_lib.py scripts/ai-atlassian-seed.py scripts/ai_atlassian_seed_lib.py scripts/ai-atlassian-docs-sync.py scripts/ai-agent-execution.py scripts/ai_agent_execution_lib.py scripts/secrets-rotation.py scripts/secrets_rotation_lib.py tests/python/release_tool_test.py tests/python/validate_docs_test.py tests/python/git_signing_mode_test.py tests/python/ai_control_plane_test.py tests/python/ai_session_startup_test.py tests/python/atlassian_platform_test.py tests/python/ai_atlassian_openapi_test.py tests/python/ai_jira_model_test.py tests/python/ai_jira_apply_test.py tests/python/ai_atlassian_backfill_test.py tests/python/ai_atlassian_migration_bundle_test.py tests/python/ai_atlassian_seed_test.py tests/python/ai_agent_execution_test.py tests/python/secrets_rotation_test.py

  test:python:
    desc: Executa a suite Python via pytest no ambiente atual
    cmds:
      - task: test:python:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  test:python:windows:
    desc: Windows - executa pytest para scripts e testes Python
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked python -m pytest

  test:python:linux:
    desc: Linux/WSL - executa pytest para scripts e testes Python
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked python -m pytest

  docs:lint:
    desc: Aplica lint de Markdown nos documentos canonicos do repo
    cmds:
      - task: docs:lint:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  docs:lint:windows:
    desc: Windows - aplica pymarkdown nos documentos canonicos do repo
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked pymarkdown --disable-rules MD001,MD013,MD032,MD034,MD036,MD038 scan README.md AGENTS.md SECURITY.md docs bootstrap/README.md tests/README.md --respect-gitignore -e docs/AI-WIP-TRACKER.md -e docs/ROADMAP-DECISIONS.md -e docs/reference -e archive

  docs:lint:linux:
    desc: Linux/WSL - aplica pymarkdown nos documentos canonicos do repo
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run --locked pymarkdown --disable-rules MD001,MD013,MD032,MD034,MD036,MD038 scan README.md AGENTS.md SECURITY.md docs bootstrap/README.md tests/README.md --respect-gitignore -e docs/AI-WIP-TRACKER.md -e docs/ROADMAP-DECISIONS.md -e docs/reference -e archive

  docs:check:
    desc: Valida links locais e referencias documentais do repo
    cmds:
      - task: docs:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  docs:check:windows:
    desc: Windows - valida links locais e referencias documentais
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/validate_docs.py"

  docs:check:linux:
    desc: Linux/WSL - valida links locais e referencias documentais
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/validate_docs.py'"

  spell:check:
    desc: Valida ortografia do repo com CSpell e dicionario tecnico versionado
    cmds:
      - task: spell:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  spell:check:windows:
    desc: Windows - valida ortografia com CSpell
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/cspell-governance.py check . --config .cspell.json"

  spell:check:linux:
    desc: Linux/WSL - valida ortografia com CSpell
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/cspell-governance.py check . --config .cspell.json'"

  spell:dictionary:audit:
    desc: Audita o dicionario local do CSpell e falha se houver redundancias nao higienizadas
    cmds:
      - task: spell:dictionary:audit:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          FIX: "{{.FIX}}"

  spell:dictionary:audit:windows:
    desc: Windows - audita redundancias no dicionario local do CSpell
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/cspell-governance.py dictionary-audit --config .cspell.json --project-words .cspell/project-words.txt{{if eq .FIX \"1\"}} --fix{{end}}"

  spell:dictionary:audit:linux:
    desc: Linux/WSL - audita redundancias no dicionario local do CSpell
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/cspell-governance.py dictionary-audit --config .cspell.json --project-words .cspell/project-words.txt{{if eq .FIX \"1\"}} --fix{{end}}'"

  spell:curate:
    desc: Curadoria assistida do dicionario do CSpell para um escopo especifico
    cmds:
      - task: spell:curate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          TARGETS: "{{default \".\" .TARGETS}}"
          APPLY: "{{.APPLY}}"

  spell:curate:windows:
    desc: Windows - curadoria de palavras desconhecidas do CSpell
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/cspell-governance.py curate {{.TARGETS}} --config .cspell.json --project-words .cspell/project-words.txt{{if eq .APPLY \"1\"}} --apply{{end}}"

  spell:curate:linux:
