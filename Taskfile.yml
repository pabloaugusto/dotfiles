      - "pwsh -NoProfile -File ./scripts/validate-branch-name.ps1 -Branch \"{{default \"\" .BRANCH}}\""

  conventions:check:branch:linux:
    desc: Linux/WSL - valida branch atual ou BRANCH
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'branch=\"{{default \"\" .BRANCH}}\"; if [ -z \"$branch\" ]; then branch=\"$(git rev-parse --abbrev-ref HEAD)\"; fi; bash ./scripts/run-python.sh ./.githooks/conventional_emoji.py --validate-branch \"$branch\"'"

  conventions:check:commit:
    desc: Valida o ultimo commit subject ou o SUBJECT informado
    cmds:
      - task: conventions:check:commit:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          SUBJECT: "{{.SUBJECT}}"

  conventions:check:commit:windows:
    desc: Windows - valida commit subject atual ou SUBJECT
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-commit-subject.ps1 -Subject \"{{default \"\" .SUBJECT}}\""

  conventions:check:commit:linux:
    desc: Linux/WSL - valida commit subject atual ou SUBJECT
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'subject=\"{{default \"\" .SUBJECT}}\"; if [ -z \"$subject\" ]; then subject=\"$(git log -1 --format=%s)\"; fi; bash ./scripts/run-python.sh ./.githooks/ci/validate_message.py \"$subject\" --context \"commit subject\"'"

  conventions:check:commits:
    desc: Valida subjects de commits no range informado ou origin/main..HEAD
    cmds:
      - task: conventions:check:commits:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          RANGE: "{{.RANGE}}"

  conventions:check:commits:windows:
    desc: Windows - valida commits do range RANGE ou origin/main..HEAD
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-commit-range.ps1 -Range \"{{default \"\" .RANGE}}\""

  conventions:check:commits:linux:
    desc: Linux/WSL - valida commits do range RANGE ou origin/main..HEAD
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'range=\"{{default \"\" .RANGE}}\"; if [ -z \"$range\" ]; then range=\"origin/main..HEAD\"; fi; subjects_json=\"$(git log --format=%s \"$range\" | bash ./scripts/run-python.sh -c \"import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))\")\"; bash ./scripts/run-python.sh ./.githooks/conventional_emoji.py --validate-many-json \"$subjects_json\" --require-emoji'"

  conventions:check:pr-commits:
    desc: Valida todos os commits de um PR no GitHub via API
    cmds:
      - task: conventions:check:pr-commits:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          REPO: "{{.REPO}}"
          PR: "{{.PR}}"

  conventions:check:pr-commits:windows:
    desc: Windows - valida commits do PR informado via API do GitHub
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [REPO, PR]
    cmds:
      - "pwsh -NoProfile -File ./scripts/validate-pr-commits.ps1 -Repo \"{{.REPO}}\" -PrNumber {{.PR}}"

  conventions:check:pr-commits:linux:
    desc: Linux/WSL - valida commits do PR informado via API do GitHub
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [REPO, PR]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./.githooks/ci/validate_pr_commits.py \"{{.REPO}}\" \"{{.PR}}\"'"

  conventions:hooks:install:
    desc: Configura este repo para usar hooks locais em .githooks
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - git config core.hooksPath .githooks

  conventions:hooks:status:
    desc: Exibe o hooksPath atual configurado no repo
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - git config --get core.hooksPath

  pr:title:check:
    desc: Alias para conventions:check:pr-title
    requires:
      vars: [TITLE]
    cmds:
      - task: conventions:check:pr-title
        vars:
          TITLE: "{{.TITLE}}"

  ci:pr:title:check:
    desc: Alias CI para conventions:check:pr-title
    requires:
      vars: [PR_TITLE]
    cmds:
      - task: conventions:check:pr-title
        vars:
          TITLE: "{{.PR_TITLE}}"

  ci:branch:check:
    desc: Alias CI para conventions:check:branch
    cmds:
      - task: conventions:check:branch
        vars:
          BRANCH: "{{.BRANCH}}"

  ci:commits:check:
    desc: Alias CI para conventions:check:commits
    cmds:
      - task: conventions:check:commits
        vars:
          RANGE: "{{.RANGE}}"

  ci:workflow:sync:check:
    desc: Valida sincronismo entre workflows, tasks e catalogos do repo
    cmds:
      - task: ci:workflow:sync:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ci:workflow:sync:check:windows:
    desc: Windows - valida sincronismo entre workflows, tasks e catalogos
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/validate_workflow_task_sync.py"

  ci:workflow:sync:check:linux:
    desc: Linux/WSL - valida sincronismo entre workflows, tasks e catalogos
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/validate_workflow_task_sync.py'"

  ci:ai:check:
    desc: Gate local de governanca IA
    deps:
      - ai:validate
      - ai:lessons:check
      - ai:worklog:close:gate
      - ai:eval:smoke
      - ci:workflow:sync:check

  ci:validate:
    desc: Auto - validacao de PR local (paridade CI) no ambiente atual
    cmds:
      - task: ci:validate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ci:validate:windows:
    desc: Windows - validacao de PR local (paridade CI)
    platforms: [windows]
    deps:
      - repo:status:windows
      - conventions:check:branch:windows
      - conventions:check:commit:windows
      - ai:validate:windows
      - ai:lessons:check:windows
      - ai:worklog:close:gate:windows
      - ai:eval:smoke:windows
      - ci:workflow:sync:check:windows
      - ci:lint:windows
      - test:unit:python:windows
      - test:unit:powershell
      - ci:docker-build:windows

  ci:validate:linux:
    desc: Linux/WSL - validacao de PR local (paridade CI)
    platforms: [linux]
    deps:
      - repo:status:linux
      - conventions:check:branch:linux
      - conventions:check:commit:linux
      - ai:validate:linux
      - ai:lessons:check:linux
      - ai:worklog:close:gate:linux
      - ai:eval:smoke:linux
      - ci:workflow:sync:check:linux
      - ci:lint:linux
      - test:unit:python:linux
      - ci:docker-build:linux

  pr:status:
    desc: Exibe status de PRs no GitHub CLI
    cmds:
      - gh pr status

  pr:checks:
    desc: Exibe checks de um PR especifico
    requires:
      vars: [PR]
    cmds:
      - gh pr checks "{{.PR}}"

  pr:validate:
    desc: Auto - pipeline local antes de abrir/atualizar PR
    cmds:
      - task: pr:validate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  pr:validate:windows:
    desc: Windows - pipeline local antes de abrir/atualizar PR
    platforms: [windows]
    deps:
      - ci:validate:windows

  pr:validate:linux:
    desc: Linux/WSL - pipeline local antes de abrir/atualizar PR
    platforms: [linux]
    deps:
      - ci:validate:linux
