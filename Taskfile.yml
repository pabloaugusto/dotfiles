version: '3'

tasks:
  default:
    desc: Lista tasks disponiveis
    cmds:
      - task --list

  sync:
    desc: Auto - sync inteligente (analisa pendencias, pergunta commit/push e sincroniza via Git)
    cmds:
      - task: sync:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  sync:windows:
    desc: Windows - sync inteligente do repo local (commit por contexto + pull/push guiado)
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesSmartSync\""

  sync:linux:
    desc: Linux/WSL - sync inteligente do repo local (commit por contexto + pull/push guiado)
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh'"

  repo:status:
    desc: Auto - status do repo dotfiles no ambiente atual
    cmds:
      - task: repo:status:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:status:windows:
    desc: Windows - status do repo atual
    platforms: [windows]
    cmds:
      - git -C "{{.TASKFILE_DIR}}" rev-parse --abbrev-ref HEAD
      - git -C "{{.TASKFILE_DIR}}" rev-parse --short HEAD
      - git -C "{{.TASKFILE_DIR}}" status --short

  repo:status:linux:
    desc: Linux/WSL - status do repo atual
    platforms: [linux]
    cmds:
      - git -C "{{.TASKFILE_DIR}}" rev-parse --abbrev-ref HEAD
      - git -C "{{.TASKFILE_DIR}}" rev-parse --short HEAD
      - git -C "{{.TASKFILE_DIR}}" status --short

  repo:update:
    desc: Auto - atualizar repo dotfiles (main + fetch --prune + pull --rebase)
    cmds:
      - task: repo:update:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:update:windows:
    desc: Windows - atualizar repo atual
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoUpdate -SwitchMain\""

  repo:update:linux:
    desc: Linux/WSL - atualizar repo atual
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' update"

  repo:update-safe:
    desc: Auto - atualizar com auto-stash para worktree suja
    cmds:
      - task: repo:update-safe:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  repo:update-safe:windows:
    desc: Windows - atualizar com auto-stash
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoUpdate -Safe -SwitchMain\""

  repo:update-safe:linux:
    desc: Linux/WSL - atualizar com auto-stash
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' update-safe"

  repo:publish:
    desc: Auto - publicar alteracoes (pull --rebase + commit + push)
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          MSG: "{{.MSG}}"

  repo:publish:windows:
    desc: Windows - publicar alteracoes
    platforms: [windows]
    requires:
      vars: [MSG]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Invoke-DotfilesRepoPublish -Message '{{.MSG}}'\""

  repo:publish:linux:
    desc: Linux/WSL - publicar alteracoes
    platforms: [linux]
    requires:
      vars: [MSG]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/df/bash/.inc/sync-smart.sh' publish \"{{.MSG}}\""

  sync:update:
    desc: Auto - alias para repo:update
    cmds:
      - task: repo:update

  sync:update:windows:
    desc: Windows - alias para repo:update:windows
    platforms: [windows]
    cmds:
      - task: repo:update:windows

  sync:update:linux:
    desc: Linux/WSL - alias para repo:update:linux
    platforms: [linux]
    cmds:
      - task: repo:update:linux

  sync:update-safe:
    desc: Auto - alias para repo:update-safe
    cmds:
      - task: repo:update-safe

  sync:update-safe:windows:
    desc: Windows - alias para repo:update-safe:windows
    platforms: [windows]
    cmds:
      - task: repo:update-safe:windows

  sync:update-safe:linux:
    desc: Linux/WSL - alias para repo:update-safe:linux
    platforms: [linux]
    cmds:
      - task: repo:update-safe:linux

  sync:publish:
    desc: Auto - alias para repo:publish
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish
        vars:
          MSG: "{{.MSG}}"

  sync:publish:windows:
    desc: Windows - alias para repo:publish:windows
    platforms: [windows]
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:windows
        vars:
          MSG: "{{.MSG}}"

  sync:publish:linux:
    desc: Linux/WSL - alias para repo:publish:linux
    platforms: [linux]
    requires:
      vars: [MSG]
    cmds:
      - task: repo:publish:linux
        vars:
          MSG: "{{.MSG}}"

  sync:wsl-gate:
    desc: Auto - gate Git-only para sincronizar Windows repo -> WSL repo local
    cmds:
      - task: sync:wsl-gate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  sync:wsl-gate:windows:
    desc: Windows - gate Git-only para sincronizar repo local do WSL
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; Sync-DotfilesWindowsToWsl\""

  sync:wsl-gate:linux:
    desc: Linux/WSL - nao aplicavel (execute sync:wsl-gate no Windows)
    platforms: [linux]
    cmds:
      - bash -lc "echo 'sync:wsl-gate deve ser executado no Windows para sincronizar o clone WSL local via Git.' && exit 1"

  env:check:
    desc: Auto - roda checkEnv no ambiente atual
    cmds:
      - task: env:check:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  env:check:windows:
    desc: Windows - roda checkEnv no PowerShell
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/df/powershell/_functions.ps1'; checkEnv\""

  env:check:linux:
    desc: Linux/WSL - roda checkEnv no Bash
    platforms: [linux]
    cmds:
      - bash -lc "source '{{.TASKFILE_DIR}}/df/bash/.inc/check-env.sh' && checkEnv"

  bootstrap:
    desc: Auto - bootstrap no ambiente atual
    cmds:
      - task: bootstrap:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  bootstrap:windows:
    desc: Windows - bootstrap completo (default)
    platforms: [windows]
    cmds:
      - task: bootstrap:windows:new

  bootstrap:windows:new:
    desc: Windows - bootstrap completo
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \"& '{{.TASKFILE_DIR}}/bootstrap/_start.ps1'\""

  bootstrap:windows:refresh:
    desc: Windows - refresh rapido
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \"& '{{.TASKFILE_DIR}}/bootstrap/_start.ps1' -Refresh\""

  bootstrap:relink:
    desc: Auto - recria os symlinks canonicos do bootstrap no ambiente atual
    cmds:
      - task: bootstrap:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}:relink

  bootstrap:windows:relink:
    desc: Windows - recria symlinks/junctions do bootstrap
    platforms: [windows]
    cmds:
      - "pwsh -NoProfile -Command \". '{{.TASKFILE_DIR}}/bootstrap/bootstrap-config.ps1'; if (!(Ensure-BootstrapConfigReady -DotFilesDirectory '{{.TASKFILE_DIR}}')) { exit 1 }; . '{{.TASKFILE_DIR}}/bootstrap/bootstrap-windows.ps1' -RelinkOnly\""

  bootstrap:linux:
    desc: Linux/WSL - bootstrap Ubuntu
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/bootstrap/bootstrap-ubuntu-wsl.sh'"

  bootstrap:linux:relink:
    desc: Linux/WSL - recria symlinks do bootstrap
    platforms: [linux]
    cmds:
      - bash -lc "bash '{{.TASKFILE_DIR}}/bootstrap/bootstrap-ubuntu-wsl.sh' relink"

  ci:docker-build:
    desc: Auto - build Docker local
    cmds:
      - task: ci:docker-build:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ci:docker-build:windows:
    desc: Windows - docker build local
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker build . --file Dockerfile

  ci:docker-build:linux:
    desc: Linux/WSL - docker build local
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker build . --file Dockerfile

  ci:lint:
    desc: Auto - lint local no ambiente atual
    cmds:
      - task: ci:lint:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ci:lint:windows:
    desc: Windows - validacao sintatica dos scripts .ps1
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -Command '$ErrorActionPreference=\"Stop\"; $failed=$false; git ls-files \"bootstrap/*.ps1\" \"bootstrap/**/*.ps1\" \"df/*.ps1\" \"df/**/*.ps1\" \"scripts/*.ps1\" \"scripts/**/*.ps1\" \"tests/*.ps1\" \"tests/**/*.ps1\" | ForEach-Object { $errs=$null; [System.Management.Automation.Language.Parser]::ParseFile($_,[ref]$null,[ref]$errs) | Out-Null; if($errs -and $errs.Count -gt 0){ $failed=$true; $errs | ForEach-Object { Write-Host ($_.Extent.File + \":\" + $_.Extent.StartLineNumber + \": \" + $_.Message) } } }; if($failed){ exit 1 }'"

  ci:lint:linux:
    desc: Linux/WSL - validacao sintatica dos scripts .sh
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'set -euo pipefail; if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then { git ls-files \"*.sh\"; git ls-files \".githooks/commit-msg\" \".githooks/pre-push\" \".githooks/prepare-commit-msg\"; } | sort -u; else { find . -type f -name \"*.sh\"; find .githooks -maxdepth 1 -type f \\( -name \"commit-msg\" -o -name \"pre-push\" -o -name \"prepare-commit-msg\" \\); } | sed \"s#^./##\" | sort -u; fi | while IFS= read -r f; do [ -n \"$f\" ] || continue; bash -n \"$f\"; done'"

  test:unit:powershell:
    desc: Executa testes Pester da pasta tests/powershell
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -Command \"if (-not (Get-Command Invoke-Pester -ErrorAction SilentlyContinue)) { throw 'Invoke-Pester nao encontrado. Instale Pester antes de rodar esta task.' }; Invoke-Pester -Path './tests/powershell'\""

  test:integration:
    desc: Executa harness de integracao do bootstrap no ambiente atual
    cmds:
      - task: test:integration:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  test:integration:windows:
    desc: Windows - relink integration em perfil temporario isolado
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/run-windows-bootstrap-integration.ps1"

  test:integration:linux:
    desc: Linux/WSL - relink integration em container OCI com Bats
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash ./scripts/run-linux-bootstrap-integration.sh"

  test:unit:python:
    desc: Executa testes unitarios Python da pasta tests/python
    cmds:
      - task: test:unit:python:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  test:unit:python:windows:
    desc: Windows - executa testes unitarios Python da pasta tests/python
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/run-python-unittests.ps1"

  test:unit:python:linux:
    desc: Linux/WSL - executa testes unitarios Python da pasta tests/python
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh -m unittest discover -s ./tests/python -p \"*_test.py\"'"

  ai:validate:
    desc: Valida AGENTS, skills, cartoes de agentes e politica de IA do repo
    cmds:
      - task: ai:validate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ai:validate:windows:
    desc: Windows - valida AGENTS, skills, cartoes de agentes e politica de IA do repo
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/validate-ai-assets.py"

  ai:validate:linux:
    desc: Linux/WSL - valida AGENTS, skills, cartoes de agentes e politica de IA do repo
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/validate-ai-assets.py'"

  ai:install:codex:
    desc: Materializa as skills canonicas de .agents/skills no catalogo local do Codex
    dir: '{{.TASKFILE_DIR}}'
    deps:
      - ai:validate
    cmds:
      - "pwsh -NoProfile -File ./scripts/install-repo-skills.ps1"

  ai:skills:check:
    desc: Alias para ai:validate
    cmds:
      - task: ai:validate

  ai:rules:check:
    desc: Valida rules, orchestration e contratos declarativos da camada de IA
    cmds:
      - task: ai:validate

  ai:chat:intake:
    desc: Registra intake de IA com preflight de pendencias e roteamento opcional
    requires:
      vars: [MESSAGE]
    cmds:
      - task: ai:chat:intake:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          MESSAGE: "{{.MESSAGE}}"
          PATHS: "{{.PATHS}}"
          RISK: "{{.RISK}}"
          ROUTE: "{{.ROUTE}}"
          PENDING_ACTION: "{{.PENDING_ACTION}}"
          WORKLOG_FILE: "{{.WORKLOG_FILE}}"
          WORKLOG_ID: "{{.WORKLOG_ID}}"
          DECISIONS_FILE: "{{.DECISIONS_FILE}}"
          OUT: "{{.OUT}}"
          ROUTE_OUT: "{{.ROUTE_OUT}}"

  ai:chat:intake:windows:
    desc: Windows - registra intake de IA com preflight de pendencias
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [MESSAGE]
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-chat-intake.py --message \"{{.MESSAGE}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --route \"{{default \"0\" .ROUTE}}\" --pending-action \"{{default \"\" .PENDING_ACTION}}\" --worklog-file \"{{default \"docs/AI-WIP-TRACKER.md\" .WORKLOG_FILE}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --decisions-file \"{{default \"docs/ROADMAP-DECISIONS.md\" .DECISIONS_FILE}}\" --out \"{{default \".cache/ai/chat-intake.json\" .OUT}}\" --route-out \"{{default \".cache/ai/route-output.json\" .ROUTE_OUT}}\""

  ai:chat:intake:linux:
    desc: Linux/WSL - registra intake de IA com preflight de pendencias
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [MESSAGE]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-chat-intake.py --message \"{{.MESSAGE}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --route \"{{default \"0\" .ROUTE}}\" --pending-action \"{{default \"\" .PENDING_ACTION}}\" --worklog-file \"{{default \"docs/AI-WIP-TRACKER.md\" .WORKLOG_FILE}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --decisions-file \"{{default \"docs/ROADMAP-DECISIONS.md\" .DECISIONS_FILE}}\" --out \"{{default \".cache/ai/chat-intake.json\" .OUT}}\" --route-out \"{{default \".cache/ai/route-output.json\" .ROUTE_OUT}}\"'"

  ai:route:
    desc: Gera task card e delegation plan declarativos para a demanda informada
    requires:
      vars: [INTENT]
    cmds:
      - task: ai:route:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          INTENT: "{{.INTENT}}"
          PATHS: "{{.PATHS}}"
          RISK: "{{.RISK}}"
          OUT: "{{.OUT}}"

  ai:route:windows:
    desc: Windows - gera roteamento declarativo
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [INTENT]
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-route.py --intent \"{{.INTENT}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --out \"{{default \".cache/ai/route-output.json\" .OUT}}\""

  ai:route:linux:
    desc: Linux/WSL - gera roteamento declarativo
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [INTENT]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-route.py --intent \"{{.INTENT}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --out \"{{default \".cache/ai/route-output.json\" .OUT}}\"'"

  ai:delegate:
    desc: Gera plano de delegacao em Markdown para revisao humana
    requires:
      vars: [INTENT]
    cmds:
      - task: ai:delegate:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          INTENT: "{{.INTENT}}"
          PATHS: "{{.PATHS}}"
          RISK: "{{.RISK}}"
          PENDING_ACTION: "{{.PENDING_ACTION}}"
          WORKLOG_FILE: "{{.WORKLOG_FILE}}"
          WORKLOG_ID: "{{.WORKLOG_ID}}"
          DECISIONS_FILE: "{{.DECISIONS_FILE}}"
          OUT: "{{.OUT}}"

  ai:delegate:windows:
    desc: Windows - gera plano de delegacao em Markdown
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [INTENT]
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-delegate.py --intent \"{{.INTENT}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --pending-action \"{{default \"\" .PENDING_ACTION}}\" --worklog-file \"{{default \"docs/AI-WIP-TRACKER.md\" .WORKLOG_FILE}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --decisions-file \"{{default \"docs/ROADMAP-DECISIONS.md\" .DECISIONS_FILE}}\" --out \"{{default \".cache/ai/delegation-plan.md\" .OUT}}\""

  ai:delegate:linux:
    desc: Linux/WSL - gera plano de delegacao em Markdown
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [INTENT]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-delegate.py --intent \"{{.INTENT}}\" --paths \"{{default \"\" .PATHS}}\" --risk \"{{default \"medium\" .RISK}}\" --pending-action \"{{default \"\" .PENDING_ACTION}}\" --worklog-file \"{{default \"docs/AI-WIP-TRACKER.md\" .WORKLOG_FILE}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --decisions-file \"{{default \"docs/ROADMAP-DECISIONS.md\" .DECISIONS_FILE}}\" --out \"{{default \".cache/ai/delegation-plan.md\" .OUT}}\"'"

  ai:eval:smoke:
    desc: Executa smoke eval de roteamento e governanca declarativa
    cmds:
      - task: ai:eval:smoke:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ai:eval:smoke:windows:
    desc: Windows - executa smoke eval de roteamento e governanca declarativa
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-eval-smoke.py"

  ai:eval:smoke:linux:
    desc: Linux/WSL - executa smoke eval de roteamento e governanca declarativa
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-eval-smoke.py'"

  ai:lessons:ensure:
    desc: Garante estrutura minima de LICOES-APRENDIDAS.md
    cmds:
      - task: ai:lessons:ensure:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}

  ai:lessons:ensure:windows:
    desc: Windows - garante estrutura minima de LICOES-APRENDIDAS.md
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-lessons.py ensure"

  ai:lessons:ensure:linux:
    desc: Linux/WSL - garante estrutura minima de LICOES-APRENDIDAS.md
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-lessons.py ensure'"

  ai:lessons:add:
    desc: Registra uma nova licao aprendida no catalogo
    requires:
      vars: [TITLE, CONTEXT, RULE, VALIDATED_SOLUTION, PREVENTION, VALIDATION]
    cmds:
      - task: ai:lessons:add:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          LESSON_ID: "{{.LESSON_ID}}"
          TITLE: "{{.TITLE}}"
          CONTEXT: "{{.CONTEXT}}"
          RULE: "{{.RULE}}"
          VALIDATED_SOLUTION: "{{.VALIDATED_SOLUTION}}"
          PREVENTION: "{{.PREVENTION}}"
          VALIDATION: "{{.VALIDATION}}"
          WORKLOG_ID: "{{.WORKLOG_ID}}"
          SOURCE_REPOS: "{{.SOURCE_REPOS}}"

  ai:lessons:add:windows:
    desc: Windows - registra uma nova licao aprendida
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [TITLE, CONTEXT, RULE, VALIDATED_SOLUTION, PREVENTION, VALIDATION]
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-lessons.py add --lesson-id \"{{default \"\" .LESSON_ID}}\" --title \"{{.TITLE}}\" --context \"{{.CONTEXT}}\" --rule \"{{.RULE}}\" --validated-solution \"{{.VALIDATED_SOLUTION}}\" --prevention \"{{.PREVENTION}}\" --validation \"{{.VALIDATION}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --source-repos \"{{default \"\" .SOURCE_REPOS}}\""

  ai:lessons:add:linux:
    desc: Linux/WSL - registra uma nova licao aprendida
    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    requires:
      vars: [TITLE, CONTEXT, RULE, VALIDATED_SOLUTION, PREVENTION, VALIDATION]
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-lessons.py add --lesson-id \"{{default \"\" .LESSON_ID}}\" --title \"{{.TITLE}}\" --context \"{{.CONTEXT}}\" --rule \"{{.RULE}}\" --validated-solution \"{{.VALIDATED_SOLUTION}}\" --prevention \"{{.PREVENTION}}\" --validation \"{{.VALIDATION}}\" --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --source-repos \"{{default \"\" .SOURCE_REPOS}}\"'"

  ai:lessons:review:
    desc: Registra a revisao de licoes de um worklog concluido
    requires:
      vars: [WORKLOG_ID, DECISION, SUMMARY]
    cmds:
      - task: ai:lessons:review:{{if or (eq .OS "Windows_NT") (eq .OS "windows")}}windows{{else}}linux{{end}}
        vars:
          WORKLOG_ID: "{{.WORKLOG_ID}}"
          DECISION: "{{.DECISION}}"
          SUMMARY: "{{.SUMMARY}}"
