    platforms: [linux]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "bash -lc 'bash ./scripts/run-python.sh ./scripts/ai-worklog.py sync-roadmap --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --limit {{default \"0\" .LIMIT}}'"

  ai:wip:check:
    desc: Alias para ai:worklog:check
    cmds:
      - task: ai:worklog:check
