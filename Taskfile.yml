          LIMIT: "{{.LIMIT}}"

  ai:worklog:sync:roadmap:windows:
    desc: Windows - sincroniza itens ativos do tracker para o roadmap
    platforms: [windows]
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - "pwsh -NoProfile -File ./scripts/invoke-python.ps1 -ScriptPath ./scripts/ai-worklog.py sync-roadmap --worklog-id \"{{default \"\" .WORKLOG_ID}}\" --limit {{default \"0\" .LIMIT}}"

  ai:worklog:sync:roadmap:linux:
